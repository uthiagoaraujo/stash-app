<style>
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#000;--accent:#7D39EB;--lime:#C6FF33;--text:#fff;--border:rgba(255,255,255,0.12);--muted:rgba(255,255,255,0.4);--font:'DM Sans',sans-serif}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}

/* ── AUTH ── */
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-box{width:100%;max-width:320px}
.auth-title{font-size:22px;font-weight:600;margin:0 0 6px}
.auth-sub{color:var(--muted);font-size:14px;margin:0 0 32px}

/* ── APP ── */
#app{max-width:480px;margin:0 auto;padding-bottom:84px;min-height:100vh}
.section{display:none;opacity:0;transition:opacity 150ms ease;padding:20px 16px 28px}
.section.visible{opacity:1}

/* ── BOTTOM NAV ── */
#bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#7D39EB;border-top:none;display:flex;justify-content:space-around;align-items:center;padding:6px 0 10px;z-index:100;animation:navBg 4s ease-in-out infinite alternate}

@keyframes navBg{0%{background:#7D39EB}100%{background:#C6FF33}}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 6px;color:rgba(255,255,255,0.65);font-size:10px;font-weight:500;letter-spacing:0.02em;user-select:none;border:none;background:none;flex:1;min-width:0;position:relative;z-index:1;animation:navItemCol 4s ease-in-out infinite alternate}
@keyframes navItemCol{0%{color:rgba(255,255,255,0.65)}100%{color:rgba(0,0,0,0.45)}}
.nav-item.active{animation:navActiveCol 4s ease-in-out infinite alternate}
@keyframes navActiveCol{0%{color:#C6FF33}100%{color:#000}}
.nav-item svg{width:20px;height:20px;flex-shrink:0}

/* -- HOME BUTTONS -- */
.home-action-btns{display:flex;flex-direction:column;gap:16px;padding:8px 0}
.home-btn{width:100%;padding:28px 20px;border:none;border-radius:10px;font-family:var(--font);font-size:1.4rem;font-weight:600;cursor:pointer;letter-spacing:0.01em;transition:opacity 150ms}
.home-btn:active{opacity:.82}
.home-btn-gasto{background:#7D39EB;color:#fff}
.home-btn-fat{background:#C6FF33;color:#000}
/* -- TOTAL CARD -- */
.total-card{border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:20px}
.total-card-label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
.total-card-value{font-size:28px;font-weight:600;line-height:1.2}

/* ── INPUTS ── */
input,select,textarea{width:100%;background:#000;border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:6px;padding:11px 12px;font-family:var(--font);font-size:14px;outline:none;transition:border-color 150ms,box-shadow 150ms;appearance:none;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(125,57,235,0.2)}
input[type=checkbox]{width:18px;height:18px;padding:0;flex-shrink:0;accent-color:var(--accent);cursor:pointer;border:none;box-shadow:none;background:transparent}
input[type=date]{color-scheme:dark}
select option{background:#111;color:#fff}
::placeholder{color:rgba(255,255,255,0.3)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border-radius:6px;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;border:none;transition:opacity 150ms;user-select:none}
.btn:hover{opacity:.85}.btn:active{opacity:.7}
.btn-primary{background:var(--accent);color:#fff;width:100%;margin-top:6px}
.btn-export{background:transparent;color:var(--lime);border:1px solid rgba(198,255,51,0.3);font-size:13px;padding:8px 16px}
.export-row{display:flex;justify-content:flex-end;margin-top:20px}

/* ── TOGGLES ── */
.toggle-group{display:flex;gap:8px}
.toggle-btn{flex:1;padding:10px;border:1px solid rgba(255,255,255,0.2);border-radius:6px;background:transparent;color:var(--muted);font-family:var(--font);font-size:14px;cursor:pointer;transition:all 150ms}
.toggle-btn.selected{border-color:var(--accent);color:var(--accent);background:rgba(125,57,235,0.1)}
.toggle-btn:hover:not(.selected){border-color:rgba(255,255,255,.35);color:rgba(255,255,255,.7)}

/* ── CARDS ── */
.cards-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin-bottom:24px;scrollbar-width:none}
.cards-scroll::-webkit-scrollbar{display:none}
.seg-card{flex:0 0 auto;min-width:118px;border:1px solid var(--border);border-radius:8px;padding:14px}
.seg-card-name{font-size:11px;color:var(--muted);margin-bottom:6px}
.seg-card-amount{font-size:15px;font-weight:600}
.summary-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:24px}
.summary-card{border:1px solid var(--border);border-radius:8px;padding:12px 10px}
.card-label{font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px}
.card-value{font-size:14px;font-weight:600}

/* ── PERIOD FILTER ── */
.period-filters{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.period-filters::-webkit-scrollbar{display:none}
.period-btn{flex:0 0 auto;padding:6px 14px;border:1px solid rgba(255,255,255,0.2);border-radius:20px;background:transparent;color:var(--muted);font-family:var(--font);font-size:13px;cursor:pointer;transition:all 150ms;white-space:nowrap}
.period-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(125,57,235,0.08)}
.period-btn:hover:not(.active){color:rgba(255,255,255,.7)}
.custom-range{display:flex;gap:8px;margin-bottom:20px}
.custom-range input{flex:1}

/* ── HOME TABS ── */
.home-tabs{display:flex;gap:8px;margin-bottom:24px}
.tab-btn{flex:1;padding:10px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);font-family:var(--font);font-size:14px;cursor:pointer;transition:all 150ms}
.tab-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(125,57,235,0.08)}
.tab-btn:hover:not(.active){border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.7)}

/* ── APP HEADER ── */
#app-header{display:flex;align-items:center;gap:8px;padding:18px 16px 0;font-size:15px;font-weight:600;letter-spacing:-0.01em;color:var(--text);user-select:none}
#app-header svg{flex-shrink:0;display:block}

.section-title{font-size:20px;font-weight:600;margin:0 0 24px}

/* ── ENTRY LIST ── */
.entry-list{display:flex;flex-direction:column}
.entry-item{border-bottom:1px solid rgba(255,255,255,0.06)}
.entry-item:last-child{border-bottom:none}
.entry-header{display:flex;align-items:center;padding:12px 0;gap:12px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.entry-main{flex:1;min-width:0}
.entry-label{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{display:inline-block;font-size:10px;border-radius:4px;padding:2px 6px;font-weight:500;line-height:1.4;white-space:nowrap}
.tag-seg{background:rgba(125,57,235,0.15);color:var(--accent)}
.tag-status{background:rgba(255,255,255,0.08);color:var(--muted)}
.tag-method{background:rgba(255,255,255,0.06);color:var(--muted)}
.entry-right{text-align:right;flex-shrink:0}
.entry-amount{font-size:14px;font-weight:500}
.entry-date-small{font-size:11px;color:var(--muted);margin-top:3px}
.entry-open .entry-header{padding-bottom:10px}
.entry-edit{padding:12px 0 16px;border-top:1px solid rgba(255,255,255,0.08);animation:fadeSlide 150ms ease}
.edit-row{margin-bottom:10px}
.edit-actions{display:flex;gap:8px;margin-top:14px}
.btn-del{background:transparent;border:1px solid rgba(255,77,77,0.35);color:#ff4d4d;padding:11px 20px;border-radius:6px;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:opacity 150ms;flex-shrink:0}
.btn-del:hover{opacity:.8}

/* ── SORT BAR ── */
.sort-bar{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:16px}
.sort-bar::-webkit-scrollbar{display:none}
.sort-btn{flex:0 0 auto;padding:5px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:16px;background:transparent;color:var(--muted);font-family:var(--font);font-size:12px;cursor:pointer;transition:all 150ms;white-space:nowrap}
.sort-btn.active{border-color:rgba(255,255,255,0.55);color:#fff}
.sort-btn:hover:not(.active){color:rgba(255,255,255,.6)}

/* ── FILTER TAGS ── */
.filter-tags{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:16px}
.filter-tags::-webkit-scrollbar{display:none}
.filter-tag{flex:0 0 auto;padding:5px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:16px;background:transparent;color:var(--muted);font-family:var(--font);font-size:12px;cursor:pointer;transition:all 150ms;white-space:nowrap}
.filter-tag.active-lime{border-color:var(--lime);color:#000;background:var(--lime);font-weight:600}
.filter-tag:hover:not(.active-lime){color:rgba(255,255,255,.7)}

/* ── MINI BAR LIST (Insights commitments) ── */
.mini-bar-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.mini-bar-row{display:flex;align-items:center;gap:8px;font-size:12px}
.mini-bar-label{width:52px;flex-shrink:0;color:var(--muted);font-size:11px}
.mini-bar-track{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.mini-bar-fill{height:100%;background:var(--accent);border-radius:2px;min-width:2px;transition:width 300ms ease}
.mini-bar-val{min-width:82px;text-align:right;font-weight:500;font-size:12px}

/* ── INSIGHT TABLE ── */
.insight-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px}
.insight-table td{padding:6px 0;vertical-align:middle}
.insight-table td:first-child{color:var(--muted)}
.insight-table td:last-child{text-align:right;font-weight:500}
.insight-table tr+tr td{border-top:1px solid rgba(255,255,255,0.06)}

/* -- MONTH NAV -- */
.month-nav{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:20px;padding:4px 0}
.month-nav-btn{background:transparent;border:1px solid var(--border);color:var(--text);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;line-height:1;transition:all 150ms;flex-shrink:0;padding:0}
.month-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.month-nav-label{font-size:16px;font-weight:600;min-width:64px;text-align:center}
.month-nav-future{font-size:11px;color:var(--lime);text-align:center;margin:-14px 0 16px;letter-spacing:0.06em}
.seg-card{cursor:pointer;transition:border-color 150ms}
.seg-card:hover{border-color:rgba(255,255,255,0.25)}
.seg-card.seg-active{border-color:var(--accent)}
.seg-expanded{border:1px solid rgba(125,57,235,0.3);border-radius:8px;padding:14px;margin-bottom:16px;animation:fadeSlide 150ms ease}
.seg-expanded-title{font-size:11px;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px}
.cycle-progress-track{width:100%;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;margin-top:8px}
.cycle-progress-fill{height:100%;background:var(--lime);border-radius:3px}
/* ── CHARTS ── */
.chart-wrap{margin-bottom:28px;position:relative}
.chart-wrap canvas{max-height:220px}
.chart-title{font-size:12px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px}

/* ── MISC ── */
.empty-state{text-align:center;color:var(--muted);font-size:14px;padding:40px 0}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.list-header{font-size:12px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px}
.positive{color:var(--lime)}
.negative{color:#ff4d4d}
.error-msg{color:#ff4d4d;font-size:13px;margin-top:8px}
.checkbox-row{display:flex;align-items:center;gap:10px}
.checkbox-row label{font-size:14px;cursor:pointer;color:rgba(255,255,255,.8)}
.form-wrap{animation:fadeSlide 150ms ease}
@keyframes fadeSlide{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── SALDO DISPONÍVEL (Balanço) ── */
.saldo-card{border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:20px}
.saldo-card .card-value{font-size:22px}
.saldo-edit-btn{background:transparent;border:none;color:var(--muted);font-family:var(--font);font-size:12px;cursor:pointer;padding:2px 8px;border-radius:4px;transition:color 150ms}
.saldo-edit-btn:hover{color:var(--text)}
.saldo-projection{font-size:13px;color:var(--muted);margin-top:10px;border-top:1px solid rgba(255,255,255,0.06);padding-top:10px}
.saldo-projection span{font-weight:500}

/* ── INSIGHTS ── */
.insight-card{border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
.insight-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.insight-value{font-size:20px;font-weight:600}
.insight-sub{font-size:13px;color:var(--muted);margin-top:4px}
.locked-card{border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:20px;text-align:center;color:var(--muted);font-size:13px;margin-bottom:12px}
.commitment-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.commitment-row{display:flex;justify-content:space-between;font-size:13px}
.c-amount{color:var(--lime);font-weight:500}
.c-zero{color:rgba(255,255,255,.2)}
</style>
</head>
<body>

<!-- ══════════════════════ AUTH ══════════════════════ -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-title" style="display:flex;align-items:center;gap:8px">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28.35 28.35" width="28" height="28"><rect width="28.35" height="28.35" fill="#c6ff33" rx="4"/><circle cx="14.17" cy="14.17" r="7.09" fill="#fff"/><path fill="#7f3aef" d="M12.14,14.44c-.1,1.5-1.01,2.75-2.39,3.34l-2.72,1.38-1.71-3.37,2.97-1.51c.06-.03.09-.09.08-.13-.01-.04-.05-.08-.12-.09l-4.71-2.37,1.69-3.39,5.06,2.54c1.24.79,1.94,2.14,1.85,3.6Z"/><path fill="#7f3aef" d="M24.8,16.65l-1.7,3.4-3.51-1.77-1.42-.73c-1.33-.68-2.05-2.12-1.97-3.6.07-1.46.97-2.69,2.31-3.36l2.8-1.4,1.71,3.37-2.93,1.48c-.07.03-.12.04-.12.11,0,.04.03.1.09.13l4.74,2.37Z"/><path d="M19.16,21.32l-3.38,1.71-1.49-2.96c-.02-.06-.07-.09-.09-.09-.04-.01-.09.02-.14.08l-2.37,4.74-3.39-1.69,2.48-4.94c.69-1.18,1.86-1.92,3.22-1.97,1.48-.07,2.83.68,3.56,1.97l1.6,3.15Z"/><path d="M20.03,5.23l-2.38,4.77c-.69,1.37-2.07,2.19-3.61,2.15-1.45-.05-2.71-.87-3.37-2.18l-1.49-2.95,3.38-1.7,1.61,3.12,2.49-4.9,3.37,1.69Z"/></svg>
      Stash
    </div>
    <div class="auth-sub">Digite a senha para continuar.</div>
    <form onsubmit="doAuth(event)">
      <div class="form-group">
        <input type="tel" inputmode="numeric" id="auth-pass" placeholder="Senha" autocomplete="current-password" autofocus>
      </div>
      <div id="auth-error" class="error-msg" style="display:none">Senha incorreta.</div>
      <button type="submit" class="btn btn-primary" style="margin-top:12px">Entrar</button>
    </form>
  </div>

<script>
// ════════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════════
const PASS = '6924';
const SEGMENTS = ['Alimentação','Entretenimento','Transporte','Supermercado','Assinaturas','Vestuário','Moradia','Investimento','Casamento','Patrimônio','Outros'];
const ACCOUNTS  = ['Inter CPF','Inter CNPJ','Nubank CPF','Nubank CNPJ','Sicoob CPF','Sicoob CNPJ'];
const CHART_COLORS = ['#7D39EB','#C6FF33','#9B5FEF','#A3D900','#5B1DB0','#E8FF85','#3D0D7A'];

// ════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════
const S = {
  section: 'home',
  homeTab: null,            // 'gastos' | 'faturamentos' | null
  meioSelected: 'credit_card',
  gastosPeriod: 'month', gastosFrom: '', gastosTo: '',
  fatPeriod:    'month', fatFrom:    '', fatTo:    '',
  balancoPeriod:'month', balancoFrom:'', balancoTo: '',
  expandedEntry: null,   // { type: 'exp'|'inc', id: string }
  gastoTipo: 'avista',   // 'avista' | 'parc' | 'rec'
  pendingGroupEdit: null,
  homeSort: 'date-desc', homeSeg: null, expandedSegCard: null,
  gastosSort: 'date-desc', gastosSegFilter: null, gastosNavOffset: 0,
  fatSort:    'date-desc', fatAccFilter: null,    fatNavOffset: 0,
};
const CI = {}; // active Chart.js instances keyed by canvas id

// ════════════════════════════════════════════════════
// DATA LAYER
// ════════════════════════════════════════════════════
const loadExp = () => JSON.parse(localStorage.getItem('pf_expenses') || '[]');
const saveExp = a  => localStorage.setItem('pf_expenses', JSON.stringify(a));
const loadInc = () => JSON.parse(localStorage.getItem('pf_income')   || '[]');
const saveInc = a  => localStorage.setItem('pf_income',   JSON.stringify(a));
const uid = () => crypto.randomUUID();

// ════════════════════════════════════════════════════
// DATE & CYCLE UTILITIES
// ════════════════════════════════════════════════════
function isoDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayISO() { return isoDate(new Date()); }

function cycleStart(ref) {
  const d = ref ? (typeof ref === 'string' ? new Date(ref + 'T12:00:00') : new Date(ref)) : new Date();
  return d.getDate() >= 3
    ? new Date(d.getFullYear(), d.getMonth(), 3)
    : new Date(d.getFullYear(), d.getMonth() - 1, 3);
}

function addMonths(iso, n) {
  const d = new Date(iso + 'T12:00:00');
  d.setMonth(d.getMonth() + n);
  return isoDate(d);
}

function lastNCycles(n) {
  n = n || 6;
  const cs = cycleStart();
  return Array.from({ length: n }, (_, i) => {
    const idx = n - 1 - i;
    const s = new Date(cs.getFullYear(), cs.getMonth() - idx, 3);
    const e = idx === 0
      ? new Date()
      : new Date(cs.getFullYear(), cs.getMonth() - idx + 1, 2);
    return {
      start: isoDate(s),
      end:   isoDate(e),
      label: fmtCycleLabel(isoDate(s))
    };
  });
}

function getPeriodRange(period, from, to) {
  const today = new Date();
  const t = isoDate(today);
  if (period === 'week') {
    const d = new Date(today);
    const dow = d.getDay();
    d.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
    return { start: isoDate(d), end: t };
  }
  if (period === 'month')  return { start: isoDate(cycleStart()), end: t };
  if (period === 'year')   return { start: `${today.getFullYear()}-01-01`, end: t };
  if (period === 'custom' && from && to) return { start: from, end: to };
  return { start: isoDate(cycleStart()), end: t };
}

function periodLabel(period, from, to) {
  if (period === 'week')   return 'semana';
  if (period === 'month')  return 'mes';
  if (period === 'year')   return 'ano';
  if (period === 'custom' && from && to) return `${from}_${to}`;
  return 'periodo';
}

// ════════════════════════════════════════════════════
// RECURRING GENERATION  (called once on app load)
// ════════════════════════════════════════════════════
function generateRecurring() {
  const expenses = loadExp();
  const cs     = isoDate(cycleStart());
  const nextCs = addMonths(cs, 1);

  // Latest record per recurring group
  const latest = {};
  for (const e of expenses) {
    if (!e.isRecurring) continue;
    if (!latest[e._groupId] || e.date > latest[e._groupId].date) latest[e._groupId] = e;
  }

  const add = [];
  for (const [, e] of Object.entries(latest)) {
    const hasCurrent = expenses.some(x => x._groupId === e._groupId && x.date >= cs && x.date < nextCs);
    if (hasCurrent)                                         continue;
    if (e.recurringEndDate && cs > e.recurringEndDate)      continue;
    if (e.date >= nextCs)                                   continue; // hasn't started yet
    add.push({ ...e, id: uid(), date: cs });
  }
  if (add.length) saveExp([...expenses, ...add]);
}

// ════════════════════════════════════════════════════
// RECURRING INCOME GENERATION  (called once on app load)
// ════════════════════════════════════════════════════
function generateRecurringIncome() {
  const income = loadInc();
  const cs     = cycleStart();
  const csISO  = isoDate(cs);
  const nextCs = addMonths(csISO, 1);

  const latest = {};
  for (const i of income) {
    if (!i.isRecurring) continue;
    if (!latest[i._groupId] || i.date > latest[i._groupId].date) latest[i._groupId] = i;
  }

  const add = [];
  for (const [, i] of Object.entries(latest)) {
    const hasCurrent = income.some(x => x._groupId === i._groupId && x.date >= csISO && x.date < nextCs);
    if (hasCurrent)          continue;
    if (i.date >= nextCs)    continue;
    const day  = i.recurringDay || 1;
    const date = `${cs.getFullYear()}-${String(cs.getMonth()+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    add.push({ ...i, id: uid(), date });
  }
  if (add.length) saveInc([...income, ...add]);
}

// ════════════════════════════════════════════════════
// FORMAT HELPERS
// ════════════════════════════════════════════════════
const brl = n => Number(n).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
const fmtDate  = iso => iso ? iso.split('-').reverse().join('/')  : '';
const fmtShort = iso => { if (!iso) return ''; const [,m,d] = iso.split('-'); return `${d}/${m}`; };
const esc = s => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const MONTH_SHORT = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
function fmtCycleLabel(isoStart) {
  const d = new Date(isoStart + 'T12:00:00');
  return `${MONTH_SHORT[d.getMonth()]}/${String(d.getFullYear()).slice(2)}`;
}

function applySortList(arr, sortKey) {
  const r = [...arr];
  if (sortKey === 'date-asc')  r.sort((a,b) => a.date.localeCompare(b.date));
  if (sortKey === 'date-desc') r.sort((a,b) => b.date.localeCompare(a.date));
  if (sortKey === 'val-asc')   r.sort((a,b) => a.amount - b.amount);
  if (sortKey === 'val-desc')  r.sort((a,b) => b.amount - a.amount);
  return r;
}

function buildSortBar(stateKey) {
  const cur = S[stateKey];
  return `<div class="sort-bar">${[
    ['date-desc','Data ↓'],['date-asc','Data ↑'],
    ['val-desc','Valor ↓'],['val-asc','Valor ↑']
  ].map(([k,l]) =>
    `<button class="sort-btn${cur===k?' active':''}" onclick="setSort('${stateKey}','${k}')">${l}</button>`
  ).join('')}</div>`;
}

function setSort(stateKey, val) {
  S[stateKey] = val;
  S.expandedEntry = null;
  renderSection(S.section);
}

function buildFilterTags(stateKey, items) {
  const cur = S[stateKey];
  return `<div class="filter-tags">${items.map(({label, value}) => {
    const active = value === null ? !cur : cur === value;
    const call   = value === null ? `setFilter('${stateKey}',null)` : `setFilter('${stateKey}','${value.replace(/'/g,"\\'")}')`;
    return `<button class="filter-tag${active?' active-lime':''}" onclick="${call}">${esc(label)}</button>`;
  }).join('')}</div>`;
}

function setFilter(stateKey, val) {
  S[stateKey] = val || null;
  S.expandedEntry = null;
  renderSection(S.section);
}

// ════════════════════════════════════════════════════
// CHART HELPERS
// ════════════════════════════════════════════════════
function destroyAllCharts() {
  for (const k of Object.keys(CI)) { try { CI[k].destroy(); } catch(e){} delete CI[k]; }
}

function deepMerge(a, b) {
  for (const k of Object.keys(b || {})) {
    if (b[k] && typeof b[k] === 'object' && !Array.isArray(b[k])) {
      a[k] = deepMerge(typeof a[k] === 'object' ? a[k] : {}, b[k]);
    } else { a[k] = b[k]; }
  }
  return a;
}

function mkChart(id, type, data, extra) {
  if (CI[id]) { try { CI[id].destroy(); } catch(e){} delete CI[id]; }
  const canvas = document.getElementById(id);
  if (!canvas) return;

  const tickFont = { size: 11, family: "'DM Sans',sans-serif" };
  const opts = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: 'rgba(0,0,0,0.75)', padding: 10, cornerRadius: 4, borderWidth: 0,
        titleFont: tickFont, bodyFont: tickFont,
        callbacks: { label: ctx => ' ' + brl(ctx.raw) }
      }
    },
    animation: { duration: 400, easing: 'easeOutQuart' }
  };

  if (type !== 'doughnut') {
    opts.scales = {
      x: {
        grid: { color: 'rgba(255,255,255,0.06)' },
        border: { display: false },
        ticks: { color: 'rgba(255,255,255,0.5)', font: tickFont }
      },
      y: {
        grid: { color: 'rgba(255,255,255,0.06)' },
        border: { display: false },
        ticks: {
          color: 'rgba(255,255,255,0.5)',
          font: tickFont,
          callback: v => brl(v)
        }
      }
    };
  } else {
    opts.plugins.legend = {
      display: true, position: 'bottom',
      labels: {
        color: 'rgba(255,255,255,0.55)',
        font: tickFont,
        padding: 10, boxWidth: 10, boxHeight: 10
      }
    };
  }

  if (extra) deepMerge(opts, extra);
  CI[id] = new Chart(canvas.getContext('2d'), { type, data, options: opts });
}

// ════════════════════════════════════════════════════
// EXCEL EXPORT
// ════════════════════════════════════════════════════
function chkXLSX() {
  if (typeof XLSX === 'undefined') { alert('SheetJS indisponível. Verifique sua conexão.'); return false; }
  return true;
}

function doExportGastos(expenses, pLabel) {
  if (!chkXLSX()) return;
  const rows = [['Data','Segmento','Valor (R$)','Parcelas','Meio','Recorrente']];
  for (const e of expenses) {
    rows.push([
      fmtDate(e.date),
      e.segment,
      Number(e.amount.toFixed(2)),
      e.installments > 1 ? `${e.currentInstallment}/${e.installments}` : 'À vista',
      e.paymentMethod === 'credit_card' ? 'Cartão de crédito' : 'Pix',
      e.isRecurring ? 'Sim' : 'Não'
    ]);
  }
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), 'Gastos');
  XLSX.writeFile(wb, `gastos-${pLabel}-${todayISO()}.xlsx`);
}

function doExportFaturamentos(income, pLabel) {
  if (!chkXLSX()) return;
  const rows = [['Data','Conta','Cliente','Valor (R$)']];
  for (const i of income) rows.push([fmtDate(i.date), i.account, i.client, Number(i.amount.toFixed(2))]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), 'Faturamentos');
  XLSX.writeFile(wb, `faturamentos-${pLabel}-${todayISO()}.xlsx`);
}

function doExportBalanco(expenses, income, pLabel) {
  if (!chkXLSX()) return;
  const wb = XLSX.utils.book_new();

  const er = [['Data','Segmento','Valor (R$)','Parcelas','Meio','Recorrente']];
  for (const e of expenses) {
    er.push([fmtDate(e.date), e.segment, Number(e.amount.toFixed(2)),
      e.installments > 1 ? `${e.currentInstallment}/${e.installments}` : 'À vista',
      e.paymentMethod === 'credit_card' ? 'Cartão de crédito' : 'Pix',
      e.isRecurring ? 'Sim' : 'Não']);
  }

  const ir = [['Data','Conta','Cliente','Valor (R$)']];
  for (const i of income) ir.push([fmtDate(i.date), i.account, i.client, Number(i.amount.toFixed(2))]);

  const totalE = expenses.reduce((s,e) => s+e.amount, 0);
  const totalI = income.reduce((s,i)   => s+i.amount, 0);
  const sr = [['Receitas (R$)','Gastos (R$)','Saldo (R$)'],
              [Number(totalI.toFixed(2)), Number(totalE.toFixed(2)), Number((totalI-totalE).toFixed(2))]];

  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(er), 'Gastos');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(ir), 'Faturamentos');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sr), 'Resumo');
  XLSX.writeFile(wb, `balanco-${pLabel}-${todayISO()}.xlsx`);
}

// ════════════════════════════════════════════════════
// PERIOD FILTER HTML BUILDER
// ════════════════════════════════════════════════════
function buildPeriodFilters(periodKey, fromKey, toKey) {
  const cur  = S[periodKey];
  const defs = [['week','Esta semana'],['month','Este mês'],['year','Este ano'],['custom','Personalizado']];
  const btns = defs.map(([p, label]) =>
    `<button class="period-btn${cur===p?' active':''}" onclick="setPeriod('${periodKey}','${p}')">${label}</button>`
  ).join('');
  const custom = cur === 'custom' ? `
    <div class="custom-range">
      <input type="date" id="${fromKey}" value="${S[fromKey]||''}" onchange="setCustomDate('${fromKey}','${periodKey}')">
      <input type="date" id="${toKey}"   value="${S[toKey]||''}"   onchange="setCustomDate('${toKey}','${periodKey}')">
    </div>` : '';
  return `<div class="period-filters">${btns}</div>${custom}`;
}

function setPeriod(periodKey, val) {
  S[periodKey] = val;
  renderSection(S.section);
}

function setCustomDate(fieldKey, periodKey) {
  const el = document.getElementById(fieldKey);
  if (el) S[fieldKey] = el.value;
  renderSection(S.section);
}

// ════════════════════════════════════════════════════
// ENTRY HELPERS — toggle, render, save, delete
// ════════════════════════════════════════════════════
function toggleEntry(type, id) {
  if (S.expandedEntry && S.expandedEntry.type === type && S.expandedEntry.id === id) {
    S.expandedEntry = null;
  } else {
    S.expandedEntry = { type, id };
  }
  renderSection(S.section);
}

function eeSelectMeio(eid, val) {
  const cc  = document.getElementById('ee-cc-'  + eid);
  const pix = document.getElementById('ee-pix-' + eid);
  if (cc)  cc.classList.toggle('selected',  val === 'credit_card');
  if (pix) pix.classList.toggle('selected', val === 'pix');
}

function saveExpEntry(id) {
  const expenses = loadExp();
  const idx = expenses.findIndex(e => e.id === id);
  if (idx < 0) return;
  const orig  = expenses[idx];
  const date  = document.getElementById('ee-date-'  + id).value;
  const seg   = document.getElementById('ee-seg-'   + id).value;
  const val   = parseFloat(document.getElementById('ee-val-' + id).value);
  const notes = document.getElementById('ee-notes-' + id).value.trim();
  const mCC   = document.getElementById('ee-cc-'    + id).classList.contains('selected');
  if (!date || !seg || isNaN(val) || val <= 0) return;
  expenses[idx] = { ...orig, date, segment: seg, amount: val, notes, paymentMethod: mCC ? 'credit_card' : 'pix' };
  saveExp(expenses);
  if ((orig.installments > 1 || orig.isRecurring) && (seg !== orig.segment || notes !== orig.notes)) {
    S.pendingGroupEdit = { id, groupId: orig._groupId, newSeg: seg, newNotes: notes, isRec: orig.isRecurring };
    S.expandedEntry = { type: 'exp', id };
  } else {
    S.expandedEntry = null;
  }
  renderSection(S.section);
}

function applyGroupEdit(applyAll) {
  if (!S.pendingGroupEdit) return;
  if (applyAll) {
    const { groupId, newSeg, newNotes } = S.pendingGroupEdit;
    const updated = loadExp().map(e =>
      e._groupId === groupId ? { ...e, segment: newSeg, notes: newNotes } : e
    );
    saveExp(updated);
  }
  S.pendingGroupEdit = null;
  S.expandedEntry    = null;
  renderSection(S.section);
}

function deleteExpEntry(id) {
  saveExp(loadExp().filter(e => e.id !== id));
  S.expandedEntry = null;
  renderSection(S.section);
}

function saveIncEntry(id) {
  const income = loadInc();
  const idx = income.findIndex(i => i.id === id);
  if (idx < 0) return;
  const orig   = income[idx];
  const date   = document.getElementById('ie-date-'   + id).value;
  const acc    = document.getElementById('ie-acc-'    + id).value;
  const client = document.getElementById('ie-client-' + id).value.trim();
  const val    = parseFloat(document.getElementById('ie-val-'   + id).value);
  const notes  = document.getElementById('ie-notes-'  + id).value.trim();
  if (!date || !acc || !client || isNaN(val) || val <= 0) return;
  income[idx] = { ...orig, date, account: acc, client, amount: val, notes };
  saveInc(income);
  S.expandedEntry = null;
  renderSection(S.section);
}

function deleteIncEntry(id) {
  saveInc(loadInc().filter(i => i.id !== id));
  S.expandedEntry = null;
  renderSection(S.section);
}

function expenseEntryHtml(e) {
  const isOpen    = S.expandedEntry && S.expandedEntry.type === 'exp' && S.expandedEntry.id === e.id;
  const label     = e.notes ? esc(e.notes) : esc(e.segment);
  const segTag    = `<span class="tag tag-seg">${esc(e.segment)}</span>`;
  const statusTag = e.installments > 1

        <input type="text" value="${e.currentInstallment}/${e.installments}" disabled>

      <div class="edit-row">

          <button type="button" id="ee-cc-${e.id}"  class="toggle-btn${mCC  ? ' selected' : ''}" onclick="eeSelectMeio('${e.id}','credit_card')">Cartão</button>

  return `<div class="entry-item entry-open">${header}${form}</div>`;

function getNavCycleRange(offset) {
  const cs  = cycleStart();
  const s   = new Date(cs.getFullYear(), cs.getMonth() + offset, 3);
  const e   = new Date(cs.getFullYear(), cs.getMonth() + offset + 1, 2);
  const now = new Date();
  const end = (offset === 0 && now < e) ? now : e;
  return { start: isoDate(s), end: isoDate(end), label: fmtCycleLabel(isoDate(s)), isFuture: offset > 0 };
}
function navMonth(section, dir) {
  if (section === 'gastos') { S.gastosNavOffset += dir; S.gastosSegFilter = null; }
  else                      { S.fatNavOffset    += dir; S.fatAccFilter    = null; }
  S.expandedEntry = null;
  renderSection(S.section);
}
function toggleSegCard(el) {
  const seg = el.dataset ? el.dataset.s : el;
  S.expandedSegCard = (S.expandedSegCard === seg) ? null : seg;
  renderHome();
}

  const segOpts = SEGMENTS.map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join('');

    <form onsubmit="submitGasto(event)">

      </div>
      <div class="form-group">

      </div>
      <div class="form-group">
        <label class="form-label">Segmento</label>
        <select id="g-seg" required><option value="">Selecione…</option>${segOpts}</select>
      </div>
      <div class="form-group">
        <label class="form-label">Valor (R$)</label>
        <input type="number" id="g-valor" step="0.01" min="0.01" placeholder="0,00" required>
      </div>
      <div class="form-group">

        <div class="toggle-group">

        <div class="toggle-group">

          <button type="button" id="g-tipo-parc"   class="toggle-btn${tipo==='parc'?' selected':''}"   onclick="selectTipo('parc')">Parcelado</button>
          <button type="button" id="g-tipo-rec"    class="toggle-btn${tipo==='rec'?' selected':''}"    onclick="selectTipo('rec')">Recorrente</button>
        </div>
      </div>
      <div id="g-parc-wrap" style="display:${tipo==='parc'?'block':'none'};margin-top:10px">
        <label class="form-label">Número de parcelas</label>
        <input type="number" id="g-parcelas" min="2" max="99" placeholder="Ex: 12">
      </div>
      <div id="g-rec-wrap" style="display:${tipo==='rec'?'block':'none'};margin-top:10px">
        <label class="form-label">Termina em (opcional)</label>
        <input type="date" id="g-termina">
      </div>
      <button type="submit" class="btn btn-primary">Adicionar gasto</button>
    </form>`;
}

function selectMeio(val) {
  S.meioSelected = val;
  const cc  = document.getElementById('btn-cc');
  const pix = document.getElementById('btn-pix');
  if (cc)  cc.classList.toggle('selected',  val === 'credit_card');
  if (pix) pix.classList.toggle('selected', val === 'pix');
}

function selectTipo(tipo) {
  S.gastoTipo = tipo;
  ['avista','parc','rec'].forEach(t => {
    const b = document.getElementById('g-tipo-' + t);
    if (b) b.classList.toggle('selected', t === tipo);
  });
  const pw = document.getElementById('g-parc-wrap');
  const rw = document.getElementById('g-rec-wrap');
  if (pw) pw.style.display = tipo === 'parc' ? 'block' : 'none';
  if (rw) rw.style.display = tipo === 'rec'  ? 'block' : 'none';
}

function submitGasto(ev) {
  ev.preventDefault();
  const date    = document.getElementById('g-date').value;
  const segment = document.getElementById('g-seg').value;
  const valor   = parseFloat(document.getElementById('g-valor').value);
  const notes   = document.getElementById('g-notes') ? document.getElementById('g-notes').value.trim() : '';
  const tipo    = S.gastoTipo || 'avista';
  if (!date || !segment || isNaN(valor) || valor <= 0) return;

  const groupId = uid();
  const newExps = [];

  if (tipo === 'parc') {
    const pRaw    = parseInt((document.getElementById('g-parcelas') || {}).value, 10);
    const parcelas = (!pRaw || pRaw < 2) ? 2 : Math.min(pRaw, 99);
    const per     = valor / parcelas;
    for (let k = 1; k <= parcelas; k++) {
      newExps.push({ id:uid(), date:addMonths(date,k-1), segment, amount:per,
        installments:parcelas, currentInstallment:k, paymentMethod:S.meioSelected,
        isRecurring:false, recurringEndDate:null, notes, _groupId:groupId });
    }
  } else if (tipo === 'rec') {
    const te = document.getElementById('g-termina');
    newExps.push({ id:uid(), date, segment, amount:valor, installments:1, currentInstallment:1,
      paymentMethod:S.meioSelected, isRecurring:true, recurringEndDate:(te&&te.value?te.value:null),
      notes, _groupId:groupId });
  } else {
    newExps.push({ id:uid(), date, segment, amount:valor, installments:1, currentInstallment:1,
      paymentMethod:S.meioSelected, isRecurring:false, recurringEndDate:null, notes, _groupId:groupId });
  }

  saveExp([...loadExp(), ...newExps]);
  S.homeTab = null; S.gastoTipo = 'avista'; S.meioSelected = 'credit_card';
  renderHome();
}

/* ─── HOME SUMMARY ─── */
function homeSummaryHtml() {
  const cs      = isoDate(cycleStart());
  const today   = todayISO();
  const allCycleExp = loadExp().filter(e => e.date >= cs && e.date <= today);

  const totals = {};
  SEGMENTS.forEach(s => totals[s] = 0);
  allCycleExp.forEach(e => { if (totals[e.segment] !== undefined) totals[e.segment] += e.amount; });

  // Cards sorted descending by spend
  const sortedSegs = [...SEGMENTS].sort((a,b) => totals[b] - totals[a]);
  const cards = sortedSegs.map(s => `
    <div class="${S.expandedSegCard===s?'seg-card seg-active':'seg-card'}" onclick="toggleSegCard(this.dataset.s)" data-s="${esc(s)}">
      <div class="seg-card-name">${esc(s)}</div>
      <div class="seg-card-amount">${brl(totals[s])}</div>
    </div>`).join('');

  // Filter tags (only segments with spend)
  const usedSegs = sortedSegs.filter(s => totals[s] > 0);
  const filterItems = [{label:'Todos',value:null}, ...usedSegs.map(s => ({label:s,value:s}))];

  // Apply segment filter then sort
  const filtered = S.homeSeg ? allCycleExp.filter(e => e.segment === S.homeSeg) : allCycleExp;
  const sorted   = applySortList(filtered, S.homeSort);

  const list = sorted.length === 0
    ? '<div class="empty-state">Nenhum gasto registrado este ciclo.</div>'
    : sorted.map(e => expenseEntryHtml(e)).join('');

  // Expanded segment card
  const exSeg = S.expandedSegCard;
  let expandedCardHtml = '';
  if (exSeg) {
    const segExp = allCycleExp.filter(e => e.segment === exSeg).sort((a,b) => b.date.localeCompare(a.date));
    expandedCardHtml = '<div class="seg-expanded"><div class="seg-expanded-title">' + esc(exSeg) + '</div>' +
      (segExp.length === 0 ? '<div class="empty-state" style="padding:12px 0">Sem gastos.</div>' : segExp.map(e => expenseEntryHtml(e)).join('')) +
      '</div>';
  }

  return `
    <div class="cards-scroll">${cards}</div>
    ${expandedCardHtml}
    <hr class="divider">
    <div class="list-header">Gastos do ciclo atual</div>
    ${buildFilterTags('homeSeg', filterItems)}
    ${buildSortBar('homeSort')}
    <div class="entry-list">${list}</div>
    <div class="export-row">
      <button class="btn btn-export" onclick="exportHomeCycle()">↓ Exportar Excel</button>
    </div>`;
}

function exportHomeCycle() {
  const cs    = isoDate(cycleStart());
  const today = todayISO();
  doExportGastos(loadExp().filter(e => e.date >= cs && e.date <= today), 'ciclo-atual');
}

// SECTION 2 — GASTOS (analysis)
// ════════════════════════════════════════════════════
function renderGastos() {
  const el   = document.getElementById('section-gastos');
  const navR = getNavCycleRange(S.gastosNavOffset);
  const { start, end } = navR;
  const allPeriodExp = loadExp().filter(e => e.date >= start && e.date <= end);

  // Totals
  const totalGasto = allPeriodExp.reduce((s,e) => s+e.amount, 0);
  const segTotals  = {};
  SEGMENTS.forEach(s => segTotals[s] = 0);
  allPeriodExp.forEach(e => { if (segTotals[e.segment]!==undefined) segTotals[e.segment]+=e.amount; });
  const sortedSegs = [...SEGMENTS].sort((a,b) => segTotals[b]-segTotals[a]);
  const usedSegs   = sortedSegs.filter(s => segTotals[s] > 0);
  const filterItems = [{label:'Todos',value:null}, ...usedSegs.map(s => ({label:s,value:s}))];

  // Apply segment filter
  const segF     = S.gastosSegFilter;
  const expenses = segF ? allPeriodExp.filter(e => e.segment===segF) : allPeriodExp;

  // Doughnut (filtered)
  const filtSegTotals = {};
  SEGMENTS.forEach(s => filtSegTotals[s] = 0);
  expenses.forEach(e => { if(filtSegTotals[e.segment]!==undefined) filtSegTotals[e.segment]+=e.amount; });
  const filtUsedSegs = SEGMENTS.filter(s => filtSegTotals[s] > 0);

  // Seg cards (expandable)
  const segCards = sortedSegs.map(s =>
    '<div class="' + (S.expandedSegCard===s?'seg-card seg-active':'seg-card') + '" onclick="toggleSegCard(this)" data-s="' + esc(s) + '">' +
    '<div class="seg-card-name">' + esc(s) + '</div>' +
    '<div class="seg-card-amount">' + brl(segTotals[s]) + '</div></div>'
  ).join('');
  let expandedCardHtml = '';
  if (S.expandedSegCard) {
    const segExp = allPeriodExp.filter(e => e.segment===S.expandedSegCard).sort((a,b) => b.date.localeCompare(a.date));
    expandedCardHtml = '<div class="seg-expanded"><div class="seg-expanded-title">' + esc(S.expandedSegCard) + '</div>' +
      (segExp.length===0?'<div class="empty-state" style="padding:12px 0">Sem gastos.</div>':segExp.map(e=>expenseEntryHtml(e)).join('')) + '</div>';
  }

  const sorted = applySortList(expenses, S.gastosSort);
  const list   = sorted.length===0
    ? '<div class="empty-state">Nenhum gasto em ' + navR.label + '.</div>'
    : sorted.map(e => expenseEntryHtml(e)).join('');

  el.innerHTML =
    '<h1 class="section-title">Gastos</h1>' +
    '<div class="month-nav"><button class="month-nav-btn" onclick="navMonth(\'gastos\',-1)">&#8249;</button>' +
    '<span class="month-nav-label">' + navR.label + '</span>' +
    '<button class="month-nav-btn" onclick="navMonth(\'gastos\',1)">&#8250;</button></div>' +
    (navR.isFuture ? '<div class="month-nav-future">projeção</div>' : '') +
    '<div class="total-card"><div class="total-card-label">Total gasto</div><div class="total-card-value">' + brl(totalGasto) + '</div></div>' +
    buildFilterTags('gastosSegFilter', filterItems) +
    '<div class="cards-scroll">' + segCards + '</div>' +
    expandedCardHtml +
    (filtUsedSegs.length > 0 ?
      '<div class="chart-title">Distribuição por segmento</div><div class="chart-wrap" style="height:240px"><canvas id="chart-g-donut"></canvas></div>' : '') +
    '<hr class="divider">' +
    '<div class="list-header">Todos os gastos</div>' +
    buildSortBar('gastosSort') +
    '<div class="entry-list">' + list + '</div>' +
    '<div class="export-row"><button class="btn btn-export" onclick="exportGastosSection()">&#8595; Exportar Excel</button></div>';

  if (filtUsedSegs.length > 0) {
    mkChart('chart-g-donut', 'doughnut', {
      labels: filtUsedSegs,
      datasets: [{ data: filtUsedSegs.map(s=>filtSegTotals[s]), backgroundColor: CHART_COLORS.slice(0,filtUsedSegs.length), borderWidth:0, hoverOffset:4 }]
    }, { cutout: '55%' });
  }
}

function exportGastosSection() {
  const r = getNavCycleRange(S.gastosNavOffset);
  doExportGastos(loadExp().filter(e => e.date >= r.start && e.date <= r.end), r.label);
}

  el.innerHTML =
    '<h1 class="section-title">Faturamentos</h1>' +
    '<div class="month-nav"><button class="month-nav-btn" onclick="navMonth(\'fat\',-1)">&#8249;</button>' +
    '<span class="month-nav-label">' + navR.label + '</span>' +
    '<button class="month-nav-btn" onclick="navMonth(\'fat\',1)">&#8250;</button></div>' +
    (navR.isFuture ? '<div class="month-nav-future">projeção</div>' : '') +
    '<div class="total-card"><div class="total-card-label">Total recebido</div><div class="total-card-value positive">' + brl(totalRec) + '</div></div>' +
    buildFilterTags('fatAccFilter', filterItems) +
    (chartAccs.length > 0 ?
      '<div class="chart-title">Distribuição por conta</div><div class="chart-wrap" style="height:220px"><canvas id="chart-f-donut"></canvas></div>' : '') +
    '<hr class="divider">' +
    '<div class="list-header">Todos os faturamentos</div>' +
    buildSortBar('fatSort') +
    '<div class="entry-list">' + list + '</div>' +
    '<div class="export-row"><button class="btn btn-export" onclick="exportFatSection()">&#8595; Exportar Excel</button></div>';

  if (chartAccs.length > 0) {
    mkChart('chart-f-donut', 'doughnut', {
      labels: chartAccs,
      datasets: [{ data: chartAccs.map(a=>accTotals[a]), backgroundColor: CHART_COLORS.slice(0,chartAccs.length), borderWidth:0, hoverOffset:4 }]
    }, { cutout: '55%' });
  }
}

function exportFatSection() {
  const r = getNavCycleRange(S.fatNavOffset);
  doExportFaturamentos(loadInc().filter(i => i.date >= r.start && i.date <= r.end), r.label);
}

// ════════════════════════════════════════════════════
// SECTION 4 — BALANÇO GERAL
// ════════════════════════════════════════════════════
function renderBalanco() {
  const el = document.getElementById('section-balanco');
  const { start, end } = getPeriodRange(S.balancoPeriod, S.balancoFrom, S.balancoTo);
  const expenses = loadExp().filter(e => e.date >= start && e.date <= end);
  const income   = loadInc().filter(i => i.date >= start && i.date <= end);

  const totalE = expenses.reduce((s,e) => s+e.amount, 0);
  const totalI = income.reduce((s,i)   => s+i.amount, 0);
  const saldo  = totalI - totalE;

  // Saldo disponível + cycle projection (always current cycle)
  const saldoDisp = parseFloat(localStorage.getItem('pf_saldo_disponivel') || '0');
  const csISO = isoDate(cycleStart()), todayStr = todayISO();
  const cycleExp = loadExp().filter(e => e.date >= csISO && e.date <= todayStr);
  const cycleInc = loadInc().filter(i => i.date >= csISO && i.date <= todayStr);
  const cycleE0  = cycleExp.reduce((s,e) => s+e.amount, 0);
  const cycleI0  = cycleInc.reduce((s,i) => s+i.amount, 0);
  const projecao = saldoDisp + cycleI0 - cycleE0;

  const allExp = loadExp(), allInc = loadInc();
  const cycles = lastNCycles(6);
  const cycleE = cycles.map(c => allExp.filter(e => e.date >= c.start && e.date <= c.end).reduce((s,e) => s+e.amount, 0));
  const cycleI = cycles.map(c => allInc.filter(i => i.date >= c.start && i.date <= c.end).reduce((s,i) => s+i.amount, 0));

  el.innerHTML = `
    <h1 class="section-title">Balanço geral</h1>
    <div class="saldo-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div class="card-label">Saldo disponível</div>
        <button class="saldo-edit-btn" onclick="toggleSaldoEdit()">editar</button>
      </div>
      <div id="saldo-display">
        <span class="card-value">${brl(saldoDisp)}</span>
      </div>
      <div id="saldo-input-wrap" style="display:none;margin-top:6px">
        <input type="number" id="saldo-input" value="${saldoDisp.toFixed(2)}" step="0.01"
               onkeydown="if(event.key==='Enter')saveSaldo(this)"
               onblur="saveSaldo(this)" style="max-width:200px">
      </div>
      <div class="saldo-projection">
        Projeção fim do ciclo:
        <span class="${projecao >= 0 ? 'positive' : 'negative'}">${brl(projecao)}</span>
      </div>
    </div>
    ${buildPeriodFilters('balancoPeriod','balancoFrom','balancoTo')}
    <div class="summary-cards">
      <div class="summary-card">
        <div class="card-label">Receitas</div>
        <div class="card-value positive">${brl(totalI)}</div>
      </div>
      <div class="summary-card">
        <div class="card-label">Gastos</div>
        <div class="card-value">${brl(totalE)}</div>
      </div>
      <div class="summary-card">
        <div class="card-label">Saldo</div>
        <div class="card-value ${saldo >= 0 ? 'positive' : 'negative'}">${brl(saldo)}</div>
      </div>
    </div>
    <div class="chart-title">Receitas vs gastos por ciclo</div>
    <div class="chart-wrap" style="height:200px"><canvas id="chart-b-bar"></canvas></div>
    <div class="export-row">
      <button class="btn btn-export" onclick="exportBalancoSection()">↓ Exportar Excel</button>
    </div>`;

  const legendFont = { size: 11, family: "'DM Sans',sans-serif" };
  mkChart('chart-b-bar', 'bar', {
    labels: cycles.map(c => c.label),
    datasets: [
      { label: 'Receitas', data: cycleI, backgroundColor: 'rgba(198,255,51,0.7)', borderRadius: 3, borderSkipped: false },
      { label: 'Gastos',   data: cycleE, backgroundColor: 'rgba(125,57,235,0.7)', borderRadius: 3, borderSkipped: false }
    ]
  }, {
    plugins: {
      legend: {
        display: true, position: 'bottom',
        labels: { color: 'rgba(255,255,255,0.6)', font: legendFont, boxWidth: 10, boxHeight: 10, padding: 12 }
      }
    }
  });
}

function toggleSaldoEdit() {
  const display   = document.getElementById('saldo-display');
  const inputWrap = document.getElementById('saldo-input-wrap');
  const input     = document.getElementById('saldo-input');
  if (inputWrap.style.display === 'none') {
    display.style.display   = 'none';
    inputWrap.style.display = 'block';
    input.focus();
    input.select();
  } else {
    saveSaldo(input);
  }
}

function saveSaldo(input) {
  const val = parseFloat(input.value);
  localStorage.setItem('pf_saldo_disponivel', isNaN(val) ? '0' : val.toFixed(2));
  renderSection('balanco');
}

function exportBalancoSection() {
  const { start, end } = getPeriodRange(S.balancoPeriod, S.balancoFrom, S.balancoTo);
  doExportBalanco(
    loadExp().filter(e => e.date >= start && e.date <= end),
    loadInc().filter(i => i.date >= start && i.date <= end),
    periodLabel(S.balancoPeriod, S.balancoFrom, S.balancoTo)
  );
}

// ════════════════════════════════════════════════════
// SECTION 5 — INSIGHTS
// ════════════════════════════════════════════════════
function renderInsights() {
  const el     = document.getElementById('section-insights');
  const cs     = isoDate(cycleStart());
  const today  = todayISO();
  const allExp = loadExp();
  const allInc = loadInc();

  /* cycle data */
  const cycleExp      = allExp.filter(e => e.date >= cs && e.date <= today);
  const cycleTotal    = cycleExp.reduce((s,e) => s+e.amount, 0);
  const cycleInc      = allInc.filter(i => i.date >= cs && i.date <= today);
  const cycleIncTotal = cycleInc.reduce((s,i) => s+i.amount, 0);

  /* 1. Segmento líder */
  let topSeg = null;
  if (cycleTotal > 0) {
    const byS = {};
    SEGMENTS.forEach(s => byS[s] = 0);
    cycleExp.forEach(e => { if (byS[e.segment] !== undefined) byS[e.segment] += e.amount; });
    const [name, amt] = Object.entries(byS).sort((a,b) => b[1]-a[1])[0];
    if (amt > 0) topSeg = { name, amt, pct: Math.round(amt/cycleTotal*100) };
  }

  /* 2. Maior gasto único */
  const topSingle = cycleExp.length > 0
    ? cycleExp.reduce((best,e) => e.amount > best.amount ? e : best, cycleExp[0])
    : null;

  /* 3. Média diária */
  const csDate   = new Date(cs + 'T12:00:00');
  const todayD   = new Date(today + 'T12:00:00');
  const daysElapsed = Math.max(1, Math.round((todayD - csDate)/(864e5)) + 1);
  const avgDaily = cycleTotal / daysElapsed;

  /* 4. Relação receita/gasto */
  const relacao = cycleIncTotal > 0 ? Math.round(cycleTotal/cycleIncTotal*100) : null;

  /* 5. Comprometimento futuro (next 6 cycles) */
  const futureExp = allExp.filter(e => e.date > today);
  const cs0 = cycleStart();
  const commitments = [];
  let maxCommit = 0;
  for (let i = 1; i <= 6; i++) {
    const ms    = new Date(cs0.getFullYear(), cs0.getMonth()+i, 3);
    const me    = new Date(cs0.getFullYear(), cs0.getMonth()+i+1, 2);
    const msISO = isoDate(ms), meISO = isoDate(me);
    const total = futureExp.filter(e => e.date >= msISO && e.date <= meISO).reduce((s,e) => s+e.amount, 0);
    commitments.push({ label: fmtCycleLabel(msISO), total });
    if (total > maxCommit) maxCommit = total;
  }

  /* 6. Mês com maior gasto histórico */
  let mostExpCycle = null;
  if (allExp.length > 0) {
    const by = {};
    allExp.forEach(e => { const k=isoDate(cycleStart(e.date)); by[k]=(by[k]||0)+e.amount; });
    const [k,v] = Object.entries(by).sort((a,b) => b[1]-a[1])[0];
    mostExpCycle = { label: fmtCycleLabel(k), total: v };
  }

  /* 7. Mês com maior receita histórica */
  let mostIncCycle = null;
  if (allInc.length > 0) {
    const by = {};
    allInc.forEach(i => { const k=isoDate(cycleStart(i.date)); by[k]=(by[k]||0)+i.amount; });
    const [k,v] = Object.entries(by).sort((a,b) => b[1]-a[1])[0];
    mostIncCycle = { label: fmtCycleLabel(k), total: v };
  }

  /* 8. Sequência de dias sem gastos */
  const expDates = new Set(allExp.map(e => e.date));
  let streak = 0;
  for (let d = new Date(todayD); streak <= 365; d.setDate(d.getDate()-1)) {
    if (expDates.has(isoDate(d))) break;
    streak++;
  }

  /* 9. Gasto médio por segmento — últimos 3 ciclos */
  const cycles3  = lastNCycles(3);
  const segAvgs  = SEGMENTS.map(seg => {
    const tot = cycles3.reduce((s,c) =>
      s + allExp.filter(e => e.date>=c.start && e.date<=c.end && e.segment===seg).reduce((ss,e)=>ss+e.amount,0), 0);
    return { seg, avg: tot/3 };
  }).filter(x => x.avg > 0).sort((a,b) => b.avg-a.avg);


  /* ── extra insight computations ── */
  const nextCsDate     = new Date(cs0.getFullYear(), cs0.getMonth()+1, 3);
  const totalCycleDays = Math.max(1, Math.round((nextCsDate - new Date(cs+'T12:00:00'))/864e5));
  const daysRemaining  = Math.max(0, Math.round((nextCsDate - new Date(today+'T12:00:00'))/864e5));
  const pctConsumed    = Math.min(100, Math.round(daysElapsed/totalCycleDays*100));
  const projCycleAmt   = cycleTotal > 0 ? +(avgDaily * totalCycleDays).toFixed(2) : 0;

  const segTot3 = {};
  SEGMENTS.forEach(s => segTot3[s] = 0);
  cycles3.forEach(c => allExp.filter(e => e.date>=c.start&&e.date<=c.end)
    .forEach(e => { if (segTot3[e.segment]!==undefined) segTot3[e.segment]+=e.amount; }));
  const topSeg3E = Object.entries(segTot3).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1])[0];
  let trendTxt = 'sem tendência';
  if (topSeg3E && cycles3.length >= 2) {
    const prev3 = allExp.filter(e=>e.date>=cycles3[cycles3.length-2].start&&e.date<=cycles3[cycles3.length-2].end&&e.segment===topSeg3E[0]).reduce((s,e)=>s+e.amount,0);
    const last3 = allExp.filter(e=>e.date>=cycles3[cycles3.length-1].start&&e.date<=cycles3[cycles3.length-1].end&&e.segment===topSeg3E[0]).reduce((s,e)=>s+e.amount,0);
    if (prev3>0){const d=Math.round((last3-prev3)/prev3*100);trendTxt=d>0?'crescendo ↑ '+d+'%':d<0?'reduzindo ↓ '+Math.abs(d)+'%':'estável';}
  }

  const totalPaidInst   = allExp.filter(e=>e.installments>1&&e.date<=today).reduce((s,e)=>s+e.amount,0);
  const totalFutureInst = allExp.filter(e=>e.installments>1&&e.date>today).reduce((s,e)=>s+e.amount,0);

  const allCycles12 = lastNCycles(12);
  let bestSaldo=null, worstSaldo=null;
  for (const c of allCycles12) {
    const tE=allExp.filter(e=>e.date>=c.start&&e.date<=c.end).reduce((s,e)=>s+e.amount,0);
    const tI=allInc.filter(i=>i.date>=c.start&&i.date<=c.end).reduce((s,i)=>s+i.amount,0);
    const sl=tI-tE;
    if(bestSaldo===null||sl>bestSaldo.saldo) bestSaldo={label:c.label,saldo:sl};
    if(worstSaldo===null||sl<worstSaldo.saldo) worstSaldo={label:c.label,saldo:sl};
  }

  const clientTots={},accTots={};
  allInc.forEach(i=>{clientTots[i.client]=(clientTots[i.client]||0)+i.amount;accTots[i.account]=(accTots[i.account]||0)+i.amount;});
  const topClient=Object.entries(clientTots).sort((a,b)=>b[1]-a[1])[0];
  const topAcc   =Object.entries(accTots).sort((a,b)=>b[1]-a[1])[0];
  /* ── HTML ── */
  const commitBarHtml = maxCommit > 0
    ? `<div class="mini-bar-list">${commitments.map(c => `
        <div class="mini-bar-row">
          <div class="mini-bar-label">${c.label}</div>
          <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${Math.max(2,Math.round(c.total/maxCommit*100))}%"></div></div>
          <div class="mini-bar-val">${c.total > 0 ? brl(c.total) : '<span class="c-zero">—</span>'}</div>
        </div>`).join('')}</div>`
    : '<p style="color:var(--muted);font-size:13px;margin:8px 0 0">Sem parcelas futuras registradas.</p>';

  const segAvgHtml = segAvgs.length > 0
    ? `<table class="insight-table">${segAvgs.map(x =>
        `<tr><td>${esc(x.seg)}</td><td>${brl(x.avg)}</td></tr>`).join('')}</table>`
    : '<p style="color:var(--muted);font-size:13px;margin:6px 0 0">Sem dados suficientes.</p>';

  el.innerHTML = `
    <h1 class="section-title">Insights</h1>

    <div class="insight-card">
      <div class="insight-label">Segmento líder — ciclo atual</div>
      ${topSeg
        ? `<div class="insight-value">${esc(topSeg.name)}</div><div class="insight-sub">${brl(topSeg.amt)} · ${topSeg.pct}% do total</div>`
        : '<div class="insight-sub" style="margin-top:4px">Sem gastos registrados este ciclo.</div>'}
    </div>

    <div class="insight-card">
      <div class="insight-label">Maior gasto único — ciclo atual</div>
      ${topSingle
        ? `<div class="insight-value">${brl(topSingle.amount)}</div><div class="insight-sub">${topSingle.notes ? esc(topSingle.notes) : esc(topSingle.segment)} · ${fmtDate(topSingle.date)}</div>`
        : '<div class="insight-sub" style="margin-top:4px">Sem gastos registrados este ciclo.</div>'}
    </div>

    <div class="insight-card">
      <div class="insight-label">Média diária de gastos — ciclo atual</div>
      <div class="insight-value">${cycleTotal > 0 ? brl(avgDaily) : '—'}</div>
      ${cycleTotal > 0 ? `<div class="insight-sub">${daysElapsed} dias decorridos no ciclo</div>` : ''}
    </div>

    <div class="insight-card">
      <div class="insight-label">Relação receita / gasto — ciclo atual</div>
      ${relacao !== null
        ? `<div class="insight-value">${relacao}%</div><div class="insight-sub">do faturamento comprometido em gastos</div>`
        : '<div class="insight-sub" style="margin-top:4px">Sem receitas registradas este ciclo.</div>'}
    </div>

    <div class="insight-card">
      <div class="insight-label">Comprometimento futuro — próximos 6 ciclos</div>
      ${commitBarHtml}
    </div>

    <div class="insight-card">
      <div class="insight-label">Mês com maior gasto histórico</div>
      ${mostExpCycle
        ? `<div class="insight-value">${brl(mostExpCycle.total)}</div><div class="insight-sub">${esc(mostExpCycle.label)}</div>`
        : '<div class="insight-sub" style="margin-top:4px">Sem dados suficientes.</div>'}
    </div>

    <div class="insight-card">
      <div class="insight-label">Mês com maior receita histórica</div>
      ${mostIncCycle
        ? `<div class="insight-value positive">${brl(mostIncCycle.total)}</div><div class="insight-sub">${esc(mostIncCycle.label)}</div>`
        : '<div class="insight-sub" style="margin-top:4px">Sem dados suficientes.</div>'}
    </div>

    <div class="insight-card">
      <div class="insight-label">Sequência atual sem gastos</div>
      <div class="insight-value">${streak} ${streak === 1 ? 'dia' : 'dias'}</div>
      <div class="insight-sub">${streak > 0 ? 'dias consecutivos sem nenhum gasto' : 'há gastos registrados hoje'}</div>
    </div>

    <div class="insight-card">
      <div class="insight-label">Gasto médio por segmento — últimos 3 ciclos</div>
      ${segAvgHtml}
    </div>


    <div class="insight-card">
      <div class="insight-label">Maior categoria — últimos 3 ciclos</div>
      ${topSeg3E
        ? `<div class="insight-value">${esc(topSeg3E[0])}</div><div class="insight-sub">${brl(topSeg3E[1])} total · ${trendTxt}</div>`
        : '<div class="insight-sub" style="margin-top:4px">Sem dados.</div>'}
    </div>

    <div class="insight-card">
      <div class="insight-label">Total pago em parcelas</div>
      <div class="insight-value">${totalPaidInst > 0 ? brl(totalPaidInst) : '—'}</div>
      ${totalPaidInst > 0 ? '<div class="insight-sub">histórico de parcelas quitadas</div>' : ''}
    </div>

    <div class="insight-card">
      <div class="insight-label">Total ainda a pagar em parcelas</div>
      <div class="insight-value negative">${totalFutureInst > 0 ? brl(totalFutureInst) : '—'}</div>
      ${totalFutureInst > 0 ? '<div class="insight-sub">parcelas futuras já registradas</div>' : ''}
    </div>

    <div class="insight-card">
      <div class="insight-label">Projeção de gasto do ciclo atual</div>
      <div class="insight-value">${projCycleAmt > 0 ? brl(projCycleAmt) : '—'}</div>
      ${projCycleAmt > 0 ? `<div class="insight-sub">mantendo média de ${brl(avgDaily)}/dia</div>` : ''}
    </div>

    <div class="insight-card">
      <div class="insight-label">Ciclo com melhor saldo</div>
      ${bestSaldo
        ? `<div class="insight-value ${bestSaldo.saldo>=0?'positive':'negative'}">${brl(bestSaldo.saldo)}</div><div class="insight-sub">${esc(bestSaldo.label)}</div>`
        : '<div class="insight-sub" style="margin-top:4px">Sem dados.</div>'}
    </div>

    <div class="insight-card">
      <div class="insight-label">Ciclo com pior saldo</div>
      ${worstSaldo
        ? `<div class="insight-value ${worstSaldo.saldo>=0?'positive':'negative'}">${brl(worstSaldo.saldo)}</div><div class="insight-sub">${esc(worstSaldo.label)}</div>`
        : '<div class="insight-sub" style="margin-top:4px">Sem dados.</div>'}
    </div>

    <div class="insight-card">
      <div class="insight-label">Cliente que mais gerou receita</div>
      ${topClient
        ? `<div class="insight-value">${esc(topClient[0])}</div><div class="insight-sub">${brl(topClient[1])} total histórico</div>`
        : '<div class="insight-sub" style="margin-top:4px">Sem dados.</div>'}
    </div>

    <div class="insight-card">
      <div class="insight-label">Conta que mais recebeu</div>
      ${topAcc
        ? `<div class="insight-value">${esc(topAcc[0])}</div><div class="insight-sub">${brl(topAcc[1])} total histórico</div>`
        : '<div class="insight-sub" style="margin-top:4px">Sem dados.</div>'}
    </div>

    <div class="insight-card">
      <div class="insight-label">Dias restantes no ciclo</div>
      <div class="insight-value">${daysRemaining} ${daysRemaining===1?'dia':'dias'}</div>
      <div class="insight-sub">de ${totalCycleDays} dias no ciclo total</div>
    </div>

    <div class="insight-card">
      <div class="insight-label">Ciclo consumido</div>
      <div class="insight-value">${pctConsumed}%</div>
      <div class="cycle-progress-track"><div class="cycle-progress-fill" style="width:${pctConsumed}%"></div></div>
      <div class="insight-sub" style="margin-top:6px">${daysElapsed} de ${totalCycleDays} dias decorridos</div>
    </div>
    <div class="locked-card">
      <div style="font-size:22px;margin-bottom:8px;opacity:.5">🔒</div>
      <div style="font-weight:500;margin-bottom:6px;color:rgba(255,255,255,.5)">Metas</div>
      <div>Em breve: defina limites por segmento e metas de poupança</div>
    </div>`;
}

// ════════════════════════════════════════════════════
// ROUTER
// ════════════════════════════════════════════════════
function renderSection(name) {
  destroyAllCharts();
  if      (name === 'home')          renderHome();
  else if (name === 'gastos')        renderGastos();
  else if (name === 'faturamentos')  renderFaturamentos();
  else if (name === 'balanco')       renderBalanco();
  else if (name === 'insights')      renderInsights();
}

function showSection(name) {
  S.expandedEntry = null;
  destroyAllCharts();

  document.querySelectorAll('.section').forEach(s => {
    s.style.display = 'none';
    s.classList.remove('visible');
  });
  document.querySelectorAll('.nav-item').forEach(n =>
    n.classList.toggle('active', n.dataset.section === name)
  );

  S.section = name;
  renderSection(name);

  const el = document.getElementById(`section-${name}`);
  el.style.display = 'block';
  // Double rAF ensures paint before transition
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('visible')));
}

// ════════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════════
function doAuth(ev) {
  ev.preventDefault();
  const val = document.getElementById('auth-pass').value;
  if (val === PASS) {
    sessionStorage.setItem('auth', 'ok');
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = '';
    document.getElementById('bottom-nav').style.display = '';
    generateRecurring();
    generateRecurringIncome();
    showSection('home');
  } else {
    const err = document.getElementById('auth-error');
    err.style.display = 'block';
