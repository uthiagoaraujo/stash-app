<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stash</title>

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stash">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#000;--accent:#7D39EB;--lime:#C6FF33;--text:#fff;--border:rgba(255,255,255,0.12);--muted:rgba(255,255,255,0.4);--font:'DM Sans',sans-serif}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}


/* ── SYNC BAR (top progress, background API sync) ── */
#sync-bar{position:fixed;top:0;left:0;width:100%;height:3px;z-index:1000;display:none;background:rgba(198,255,51,0.12);overflow:hidden}
#sync-bar::after{content:'';display:block;height:100%;width:40%;background:#C6FF33;animation:syncSlide 1.2s ease-in-out infinite}
@keyframes syncSlide{0%{transform:translateX(-160%)}100%{transform:translateX(400%)}}

/* ── FIRST LOAD SPINNER (no cached data) ── */
#first-load-spinner{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:#000}
#fls-inner{width:32px;height:32px;border-radius:50%;border:2.5px solid rgba(198,255,51,0.18);border-top-color:#C6FF33;animation:flsSpin 0.75s linear infinite}
@keyframes flsSpin{to{transform:rotate(360deg)}}
/* ── TOAST ── */
#toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);z-index:500;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;opacity:0;transition:opacity 200ms ease;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.visible{opacity:1}
#toast.saving{background:rgba(198,255,51,0.12);color:#C6FF33;animation:toastPulse 1.2s ease-in-out infinite}
#toast.success{background:rgba(198,255,51,0.12);color:#C6FF33}
#toast.local{background:rgba(255,210,0,0.12);color:#FFD700}
@keyframes toastPulse{0%,100%{opacity:.6}50%{opacity:1}}
/* ── SYNC DOT ── */
.sync-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;transition:background 400ms}
.sync-dot.green{background:#C6FF33}
.sync-dot.red{background:#FF3B30}
/* ── SYNC BTN ── */
.sync-btn{background:none;border:none;color:rgba(255,255,255,0.35);font-size:1.4rem;cursor:pointer;padding:8px 10px;border-radius:6px;line-height:1;transition:color 150ms;flex-shrink:0;min-width:40px;min-height:40px;display:inline-flex;align-items:center;justify-content:center}
.sync-btn:hover{color:rgba(255,255,255,.7)}
.sync-btn.spinning{animation:syncSpin 1s linear infinite}
@keyframes syncSpin{to{transform:rotate(360deg)}}
.sync-label{font-size:10px;color:rgba(255,255,255,.4);white-space:nowrap;transition:color 200ms}
/* ── AUTH ── */
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-box{width:100%;max-width:320px;background:linear-gradient(135deg,#7D39EB 0%,#C6FF33 100%);background-size:200% 200%;border-radius:24px;padding:2rem;animation:authGrad 6s ease-in-out infinite alternate}
@keyframes authGrad{0%{background-position:0% 50%}100%{background-position:100% 50%}}
.auth-title{font-size:22px;font-weight:600;margin:0 0 8px;color:#fff}
.auth-sub{color:rgba(255,255,255,0.8);font-size:14px;margin:0 0 28px}

/* ── APP ── */
#app{max-width:480px;margin:0 auto;padding-bottom:84px;min-height:100vh}
.section{display:none;opacity:0;transition:opacity 150ms ease;padding:20px 16px 28px}
.section.visible{opacity:1}

/* ── BOTTOM NAV ── */
#bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid rgba(0,0,0,0.08);display:flex;justify-content:space-around;align-items:center;padding:6px 0 10px;z-index:999}

.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 6px;color:#000;font-size:10px;font-weight:500;letter-spacing:0.02em;user-select:none;border:none;background:none;flex:1;min-width:0;position:relative;z-index:1}
.nav-item.active{color:#7D39EB}
.nav-item svg{width:20px;height:20px;flex-shrink:0}

/* -- HOME BUTTONS -- */
.home-action-btns{display:flex;flex-direction:row;justify-content:center;gap:16px;padding:8px 0}
.home-btn{width:160px;height:160px;padding:20px;border:none;border-radius:16px;font-family:var(--font);cursor:pointer;transition:opacity 150ms;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.home-btn:active{opacity:.82}
.home-btn-gasto{background:#7D39EB;color:#fff}
.home-btn-fat{background:#C6FF33;color:#000}
.home-btn-icon{font-size:2.4rem;font-weight:200;line-height:1;color:#fff}
.home-btn-label{font-size:0.9rem;font-weight:600;text-align:center;line-height:1.3}
/* -- TOTAL CARD -- */
.total-card{border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:20px}
.total-card-label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
.total-card-value{font-size:28px;font-weight:600;line-height:1.2}

/* ── INPUTS ── */
input,select,textarea{width:100%;background:#000;border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:6px;padding:11px 12px;font-family:var(--font);font-size:14px;outline:none;transition:border-color 150ms,box-shadow 150ms;appearance:none;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(125,57,235,0.2)}
input[type=checkbox]{width:18px;height:18px;padding:0;flex-shrink:0;accent-color:var(--accent);cursor:pointer;border:none;box-shadow:none;background:transparent}
input[type=date]{color-scheme:dark}
select option{background:#111;color:#fff}
::placeholder{color:rgba(255,255,255,0.3)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border-radius:6px;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;border:none;transition:opacity 150ms;user-select:none}
.btn:hover{opacity:.85}.btn:active{opacity:.7}
.btn-primary{background:var(--accent);color:#fff;width:100%;margin-top:6px}
.btn-export{background:transparent;color:var(--lime);border:1px solid rgba(198,255,51,0.3);font-size:13px;padding:8px 16px}
.export-row{display:flex;justify-content:flex-end;margin-top:20px}

/* ── TOGGLES ── */
.toggle-group{display:flex;gap:8px}
.toggle-btn{flex:1;padding:10px;border:1px solid rgba(255,255,255,0.2);border-radius:6px;background:transparent;color:var(--muted);font-family:var(--font);font-size:14px;cursor:pointer;transition:all 150ms}
.toggle-btn.selected{border-color:var(--accent);color:var(--accent);background:rgba(125,57,235,0.1)}
.toggle-btn:hover:not(.selected){border-color:rgba(255,255,255,.35);color:rgba(255,255,255,.7)}

/* ── CARDS ── */
.cards-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin-bottom:24px;scrollbar-width:none}
.cards-scroll::-webkit-scrollbar{display:none}
.seg-card{flex:0 0 auto;min-width:118px;border:1px solid var(--border);border-radius:8px;padding:14px}
.seg-card-name{font-size:11px;color:var(--muted);margin-bottom:6px}
.seg-card-amount{font-size:15px;font-weight:600}
.summary-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:24px}
.summary-card{border:1px solid var(--border);border-radius:8px;padding:12px 10px}
.card-label{font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px}
.card-value{font-size:14px;font-weight:600}

/* ── PERIOD FILTER ── */
.period-filters{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.period-filters::-webkit-scrollbar{display:none}
.period-btn{flex:0 0 auto;padding:6px 14px;border:1px solid rgba(255,255,255,0.2);border-radius:20px;background:transparent;color:var(--muted);font-family:var(--font);font-size:13px;cursor:pointer;transition:all 150ms;white-space:nowrap}
.period-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(125,57,235,0.08)}
.period-btn:hover:not(.active){color:rgba(255,255,255,.7)}
.custom-range{display:flex;gap:8px;margin-bottom:20px}
.custom-range input{flex:1}

/* ── HOME TABS ── */
.home-tabs{display:flex;gap:8px;margin-bottom:24px}
.tab-btn{flex:1;padding:10px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);font-family:var(--font);font-size:14px;cursor:pointer;transition:all 150ms}
.tab-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(125,57,235,0.08)}
.tab-btn:hover:not(.active){border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.7)}

/* ── APP HEADER ── */
#app-header{display:flex;align-items:center;gap:14px;padding:24px 16px 20px;user-select:none;max-width:480px;margin:0 auto}
#app-header svg{flex-shrink:0;display:block}
.app-header-name{font-size:2rem;font-weight:700;line-height:1;letter-spacing:-0.02em;color:var(--text)}
.app-header-sub{font-size:0.75rem;font-weight:300;color:rgba(255,255,255,0.45);line-height:1.5;margin-top:2px}

.section-title{font-size:20px;font-weight:600;margin:0 0 24px}

/* ── ENTRY LIST ── */
.entry-list{display:flex;flex-direction:column}
.entry-item{border-bottom:1px solid rgba(255,255,255,0.06)}
.entry-item:last-child{border-bottom:none}
.entry-header{display:flex;align-items:center;padding:12px 0;gap:12px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.entry-main{flex:1;min-width:0}
.entry-label{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{display:inline-block;font-size:10px;border-radius:4px;padding:2px 6px;font-weight:500;line-height:1.4;white-space:nowrap}
.tag-seg{background:rgba(125,57,235,0.15);color:var(--accent)}
.tag-status{background:rgba(255,255,255,0.08);color:var(--muted)}
.tag-method{background:rgba(255,255,255,0.06);color:var(--muted)}
.tag-pix{background:#C6FF33;color:#000;font-weight:600}
.entry-right{text-align:right;flex-shrink:0}
.entry-amount{font-size:14px;font-weight:500}
.entry-date-small{font-size:11px;color:var(--muted);margin-top:3px}
.entry-open .entry-header{padding-bottom:10px}
.entry-edit{padding:12px 0 16px;border-top:1px solid rgba(255,255,255,0.08);animation:fadeSlide 150ms ease}
.edit-row{margin-bottom:10px}
.edit-actions{display:flex;gap:8px;margin-top:14px}
.btn-del{background:transparent;border:1px solid rgba(255,77,77,0.35);color:#ff4d4d;padding:11px 20px;border-radius:6px;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:opacity 150ms;flex-shrink:0}
.btn-del:hover{opacity:.8}

/* ── SORT BAR ── */
.sort-bar{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:16px}
.sort-bar::-webkit-scrollbar{display:none}
.sort-btn{flex:0 0 auto;padding:5px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:16px;background:transparent;color:var(--muted);font-family:var(--font);font-size:12px;cursor:pointer;transition:all 150ms;white-space:nowrap}
.sort-btn.active{border-color:rgba(255,255,255,0.55);color:#fff}
.sort-btn:hover:not(.active){color:rgba(255,255,255,.6)}

/* ── FILTER TAGS ── */
.filter-tags{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:16px}
.filter-tags::-webkit-scrollbar{display:none}
.filter-tag{flex:0 0 auto;padding:5px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:16px;background:transparent;color:var(--muted);font-family:var(--font);font-size:12px;cursor:pointer;transition:all 150ms;white-space:nowrap}
.filter-tag.active-lime{border-color:var(--lime);color:#000;background:var(--lime);font-weight:600}
.filter-tag:hover:not(.active-lime){color:rgba(255,255,255,.7)}

/* ── MINI BAR LIST (Insights commitments) ── */
.mini-bar-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.mini-bar-row{display:flex;align-items:center;gap:8px;font-size:12px}
.mini-bar-label{width:52px;flex-shrink:0;color:var(--muted);font-size:11px}
.mini-bar-track{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.mini-bar-fill{height:100%;background:var(--accent);border-radius:2px;min-width:2px;transition:width 300ms ease}
.mini-bar-val{min-width:82px;text-align:right;font-weight:500;font-size:12px}

/* ── INSIGHT TABLE ── */
.insight-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px}
.insight-table td{padding:6px 0;vertical-align:middle}
.insight-table td:first-child{color:var(--muted)}
.insight-table td:last-child{text-align:right;font-weight:500}
.insight-table tr+tr td{border-top:1px solid rgba(255,255,255,0.06)}

/* -- MONTH NAV -- */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding:4px 0}
.month-nav-arrows{display:flex;align-items:center;gap:12px}
.month-nav-total{font-size:16px;font-weight:600;letter-spacing:-0.01em}
.month-nav-btn{background:transparent;border:1px solid var(--border);color:var(--text);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;line-height:1;transition:all 150ms;flex-shrink:0;padding:0}
.month-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.month-nav-label{font-size:16px;font-weight:600;min-width:64px;text-align:center}
.month-nav-future{font-size:11px;color:var(--lime);text-align:center;margin:-14px 0 16px;letter-spacing:0.06em}
.month-nav-proj{font-size:10px;color:var(--lime);vertical-align:middle;margin-left:5px;font-weight:400;letter-spacing:0.04em}
.seg-card{cursor:pointer;transition:border-color 150ms}
.seg-card:hover{border-color:rgba(255,255,255,0.25)}
.seg-card.seg-active{border-color:var(--accent)}
.seg-expanded{border:1px solid rgba(125,57,235,0.3);border-radius:8px;padding:14px;margin-bottom:16px;animation:fadeSlide 150ms ease}
.seg-expanded-title{font-size:11px;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px}
.cycle-progress-track{width:100%;height:6px;background:rgba(255,255,255,0.15);border-radius:3px;overflow:hidden;margin-top:8px}
.cycle-progress-fill{height:100%;background:#C6FF33;border-radius:3px;transition:width 500ms ease}
.week-sep{padding:14px 0 6px}
.week-sep-label{display:block;font-size:0.7rem;font-weight:300;color:#C6FF33;font-family:var(--font);margin-bottom:6px;letter-spacing:0.02em}
.week-sep-line{width:100%;height:1px;background:#C6FF33;opacity:0.6}
.btn-add-gasto{width:100%;padding:14px;background:#7D39EB;color:#fff;border:none;border-radius:8px;font-family:var(--font);font-size:1rem;font-weight:600;cursor:pointer;margin-bottom:16px;transition:opacity 150ms;display:block}
.btn-add-gasto:active{opacity:.82}
/* ── FORM CARD (white) ── */
.form-card{background:#fff;border-radius:16px;padding:1.5rem;margin-bottom:16px}
.form-card input,.form-card select,.form-card textarea{background:#fff;border:1px solid rgba(0,0,0,0.15);color:#000;color-scheme:light}
.form-card input:focus,.form-card select:focus{border-color:#7D39EB;box-shadow:0 0 0 2px rgba(125,57,235,0.12)}
.form-card .form-label{color:#444}
.form-card ::placeholder{color:#bbb}
.form-card select option{background:#fff;color:#000}
.form-card .toggle-btn{border:1px solid rgba(0,0,0,0.15);color:#666;background:#f5f5f5}
.form-card .toggle-btn.selected{border-color:#7D39EB;color:#7D39EB;background:rgba(125,57,235,0.06)}
.form-card .btn-primary{background:#7D39EB;color:#fff;width:100%;margin-top:6px}
/* ── SECTION BUTTONS ── */
.btn-novo-cartao{width:100%;padding:14px;background:#7D39EB;color:#fff;border:none;border-radius:8px;font-family:var(--font);font-size:1rem;font-weight:600;cursor:pointer;margin-bottom:16px;transition:opacity 150ms;display:block}
.btn-novo-pix{width:100%;padding:14px;background:#C6FF33;color:#000;border:none;border-radius:8px;font-family:var(--font);font-size:1rem;font-weight:600;cursor:pointer;margin-bottom:16px;transition:opacity 150ms;display:block}
.btn-novo-cartao:active,.btn-novo-pix:active{opacity:.82}
/* ── NAV LIME (Cartão + Pix pages) ── */
.nav-lime-label{color:#C6FF33!important;font-weight:600}
.nav-lime-btn{border-color:rgba(198,255,51,0.5)!important;color:#C6FF33!important}
/* ── PROJ TAG (inline) ── */
.proj-tag{display:inline-block;font-size:10px;color:#C6FF33;border:1px solid rgba(198,255,51,0.4);border-radius:4px;padding:1px 6px;margin-left:8px;vertical-align:middle;letter-spacing:0.04em}
/* ── CC SUMMARY ENTRY ── */
.entry-cc-summary .entry-header{cursor:default;opacity:.85}
.entry-cc-summary .entry-header::after{content:'auto';font-size:9px;color:var(--muted);margin-left:auto;padding-left:8px}/* ── INSIGHT INFOGRAPHICS ── */
.insight-bar-wrap{height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;margin:10px 0 6px}
.insight-bar-fill{height:100%;background:#7D39EB;border-radius:3px;transition:width 400ms ease}
.commit-bars{display:flex;gap:4px;align-items:flex-end;margin-top:12px}
.commit-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.commit-bar{width:100%;background:#7D39EB;border-radius:3px 3px 0 0;min-height:2px}
.commit-bar-lbl{font-size:9px;color:var(--muted);text-align:center;letter-spacing:0.02em}
.sparkline-wrap{margin-top:8px;overflow:visible}
/* ── CHARTS ── */
.chart-wrap{margin-bottom:28px;position:relative}
.chart-wrap canvas{max-height:220px}
.chart-title{font-size:12px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px}

/* ── MISC ── */
.empty-state{text-align:center;color:var(--muted);font-size:14px;padding:40px 0}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}

<script>
// ════════════════════════════════════════════════════
// TOAST + SYNC STATUS
// ════════════════════════════════════════════════════
let _toastTimer = null;
function showToast(msg, type, duration) {
  const el = document.getElementById('toast');
  if (!el) return;
  if (_toastTimer) { clearTimeout(_toastTimer); _toastTimer = null; }
  el.textContent = msg;
  el.className   = 'visible ' + type;
  if (duration > 0) _toastTimer = setTimeout(() => { el.className = ''; }, duration);
}
function setSyncDot(state) {
  const d = document.getElementById('sync-dot');
  if (d) d.className = 'sync-dot ' + state;
}
async function manualSync() {
  const btn = document.getElementById('sync-btn');
  const lbl = document.getElementById('sync-label');
  if (btn) btn.classList.add('spinning');
  if (lbl) lbl.textContent = 'Sincronizando...';
  try {
    await syncFromAPI(true);
    if (lbl) { lbl.textContent = '✓ Atualizado'; setTimeout(() => { if (lbl) lbl.textContent = ''; }, 2000); }
    setSyncDot('green');
  } catch(e) {
    if (lbl) { lbl.textContent = 'Sem conexão'; setTimeout(() => { if (lbl) lbl.textContent = ''; }, 2000); }
    setSyncDot('red');
  }
  if (btn) btn.classList.remove('spinning');
}
// ════════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════════
const SEGMENTS = ['Alimentação','Assinatura','Casamento','Entretenimento','Investimento','Moradia','Outros','Patrimônio','Saída','Supermercado','Transporte','Vestuário'];
const CHART_COLORS = ['#7D39EB','#C6FF33','#9B5FEF','#A3D900','#5B1DB0','#E8FF85','#3D0D7A'];

// ════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════
const S = {
  section: 'home',
  homeFormOpen: false,
  meioSelected: 'credit_card',
  gastoTipo: 'avista',
  cartaoNavOffset: 0, cartaoFormOpen: false, cartaoSegFilter: null, cartaoSort: 'date-desc',
  pixNavOffset: 0,    pixFormOpen: false,    pixSegFilter: null,    pixSort: 'date-desc',
  expandedSegCard: null, cardsScrollLeft: 0,
  expandedEntry: null,
  pendingGroupEdit: null,
  pendingDeleteRecurring: null,
  pendingDeleteInstallment: null,
};
// ════════════════════════════════════════════════════
// DATA LAYER — localStorage is the source of truth
// ════════════════════════════════════════════════════
const DB = { expenses: [] };

// GET /api/data → {expenses: [...]}
async function serverGet() {
  try {
    const r = await fetch('/api/data');
    if (!r.ok) return null;
    const d = await r.json();
    return Array.isArray(d.expenses) ? d.expenses : null;
  } catch(e) { return null; }
}

// POST /api/data ← {expenses: [...]}
async function serverSet(expenses) {
  try {
    const r = await fetch('/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ expenses })
    });
    return r.ok;
  } catch(e) { return false; }
}

// Read full array (includes deleted — for all save/merge operations)
const loadExpAll = () => DB.expenses;
// Read visible array (excludes deleted — for all UI rendering)
const loadExp    = () => DB.expenses.filter(e => !e.deleted);

const uid = () => crypto.randomUUID();

// LOW-LEVEL: write DB → localStorage → upload Sheets (no side effects, no CCS)
function _persist(arr) {
  DB.expenses = arr;
  localStorage.setItem('pf_expenses', JSON.stringify(arr));
  console.log('SAVED: ' + arr.length + ' entries in localStorage');
  serverSet(arr).then(ok => {
    console.log('[Server] ok=' + ok + ' | ' + arr.length + ' entries');
    if (ok) { setSyncDot('green'); } else { setSyncDot('red'); }
  });
}

// USER SAVE: step1=DB, step2=localStorage, step3=Sheets async, step4=recompute CCS
function saveExp(arr) {
  // Steps 1+2: synchronous, blocking — localStorage is updated before anything else
  DB.expenses = arr;
  localStorage.setItem('pf_expenses', JSON.stringify(arr));
  console.log('SAVED: ' + arr.length + ' entries in localStorage');

  // Step 3: async fire-and-forget upload to Sheets
  showToast('Salvando...', 'saving', 0);
  setSyncDot('red');
  serverSet(arr).then(ok => {
    console.log('[Server] ok=' + ok + ' | ' + arr.length + ' entries');
    if (ok) { showToast('✓ Sincronizado', 'success', 2000); setSyncDot('green'); }
    else     { showToast('⚠ Salvo localmente', 'local', 4000); }
  });

  // Step 4: recompute CC summaries (uses _persist, never calls saveExp again)
  _recomputeCCS();
}

// CC SUMMARY recompute — uses same cycle range as getNavCycleRange (caps current cycle at today)
function _recomputeCCS() {
  const all        = DB.expenses;
  const real       = all.filter(e => !e.isCreditCardSummary); // strip old cc summaries only
  const visible    = real.filter(e => !e.deleted);             // exclude soft-deleted
  const today      = todayISO();
  const currCsISO  = isoDate(cycleStart());                    // current cycle start (e.g. "2026-05-03")

  // Group entries by cycle, using the SAME effective end as renderCartao/getNavCycleRange:
  //   current cycle → cap at today  (matches Cartão page offset=0)
  //   all other cycles → cap at 2nd of following month (full cycle)
  const cycleEntries = {};
  for (const e of visible) {
    if (e.paymentMethod !== 'credit_card') continue;
    const csDate      = cycleStart(e.date);
    const csISO       = isoDate(csDate);
    const cycleEnd2   = isoDate(new Date(csDate.getFullYear(), csDate.getMonth() + 1, 2));
    const effectiveEnd = (csISO === currCsISO) ? today : cycleEnd2;
    if (e.date <= effectiveEnd) {
      if (!cycleEntries[csISO]) cycleEntries[csISO] = [];
      cycleEntries[csISO].push(e);
    }
  }

  const MONTHS = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const newSums = [];
  for (const [csISO, entries] of Object.entries(cycleEntries)) {
    const total = entries.reduce((s, e) => s + e.amount, 0);
    if (total <= 0) continue;
    const d = new Date(csISO + 'T12:00:00');
    const lbl = MONTHS[d.getMonth()] + '/' + String(d.getFullYear()).slice(2);
    console.log('CC Summary ' + lbl + ': summing ' + entries.length + ' entries, total R$' + total.toFixed(2));
    const sumDate = addMonths(csISO, 1);
    const [y, m] = sumDate.slice(0,7).split('-');
    newSums.push({ id:'cc_total_'+y+'_'+m, date:sumDate, segment:'Outros',
      amount:+total.toFixed(2), installments:1, currentInstallment:1,
      paymentMethod:'pix', isRecurring:false, recurringEndDate:null,
      notes:'Cartão de Crédito', _groupId:'cc_total_'+y+'_'+m, isCreditCardSummary:true });
  }
  const merged = [...real, ...newSums];
  if (JSON.stringify(merged) !== JSON.stringify(all)) {
    _persist(merged);
  }
}
// Public alias kept for external callers
function updateCreditCardSummaries() { _recomputeCCS(); }

function loadFromCache() {
  const raw = localStorage.getItem('pf_expenses');
  DB.expenses = raw ? JSON.parse(raw) : [];
}

// BACKGROUND SYNC — additive only, localStorage always wins conflicts
async function syncFromAPI(force) {
  const bar = document.getElementById('sync-bar');
  if (bar) bar.style.display = 'block';
  try {
    const re = await serverGet();
    if (Array.isArray(re)) {
      const local    = DB.expenses;          // current localStorage array
      const localMap = {};
      for (const e of local) localMap[e.id] = true;

      // Add ONLY entries whose id doesn't exist in localStorage — never overwrite
      let added = 0;
      const toAdd = [];
      for (const e of re) {
        if (!localMap[e.id]) { toAdd.push(e); added++; }
      }
      const merged = [...local, ...toAdd];
      console.log('SYNC: localStorage had ' + local.length + ', Server had ' + re.length + ', merged result ' + merged.length);

      if (added > 0) {
        DB.expenses = merged;
        localStorage.setItem('pf_expenses', JSON.stringify(merged));
        serverSet(merged); // push merged back to Sheets
        renderSection(S.section);
      } else if (local.length > re.length) {
        // Local has more entries — upload local to Sheets to catch it up
        serverSet(local);
        console.log('SYNC: uploaded local(' + local.length + ') to server (server was behind)');
      }
    }
    setSyncDot('green');
  } catch(e) { setSyncDot('red'); }
  if (bar) { bar.style.opacity = '0'; bar.style.transition = 'opacity 400ms'; setTimeout(() => { bar.style.display = 'none'; bar.style.opacity = '1'; bar.style.transition = ''; }, 420); }
  const fls = document.getElementById('first-load-spinner');
  if (fls) fls.style.display = 'none';
}


const CI = {}; // active Chart.js instances keyed by canvas id

// ════════════════════════════════════════════════════
// DATE & CYCLE UTILITIES
// ════════════════════════════════════════════════════
function isoDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayISO() { return isoDate(new Date()); }

function cycleStart(ref) {
  const d = ref ? (typeof ref === 'string' ? new Date(ref + 'T12:00:00') : new Date(ref)) : new Date();
  return d.getDate() >= 3
    ? new Date(d.getFullYear(), d.getMonth(), 3)
    : new Date(d.getFullYear(), d.getMonth() - 1, 3);
}

function addMonths(iso, n) {
  const d = new Date(iso + 'T12:00:00');
  d.setMonth(d.getMonth() + n);
  return isoDate(d);
}

function lastNCycles(n) {
  n = n || 6;
  const cs = cycleStart();
  return Array.from({ length: n }, (_, i) => {
    const idx = n - 1 - i;
    const s = new Date(cs.getFullYear(), cs.getMonth() - idx, 3);
    const e = idx === 0
      ? new Date()
      : new Date(cs.getFullYear(), cs.getMonth() - idx + 1, 2);
    return {
      start: isoDate(s),
      end:   isoDate(e),
      label: fmtCycleLabel(isoDate(s))
    };
  });
}

function lastNCyclesRelativeTo(n, navOffset) {
  const cs  = cycleStart();
  const now = new Date();
  return Array.from({ length: n }, (_, i) => {
    const rel = navOffset - (n - 1 - i);
    const s   = new Date(cs.getFullYear(), cs.getMonth() + rel, 3);
    const e   = new Date(cs.getFullYear(), cs.getMonth() + rel + 1, 2);
    const end = (rel === 0 && now < e) ? now : e;
    return { start: isoDate(s), end: isoDate(end), label: fmtCycleLabel(isoDate(s)) };
  });
}

function getPeriodRange(period, from, to) {
  const today = new Date();
  const t = isoDate(today);
  if (period === 'week') {
    const d = new Date(today);
    const dow = d.getDay();
    d.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
    return { start: isoDate(d), end: t };
  }
  if (period === 'month')  return { start: isoDate(cycleStart()), end: t };
  if (period === 'year')   return { start: `${today.getFullYear()}-01-01`, end: t };
  if (period === 'custom' && from && to) return { start: from, end: to };
  return { start: isoDate(cycleStart()), end: t };
}

function periodLabel(period, from, to) {
  if (period === 'week')   return 'semana';
  if (period === 'month')  return 'mes';
  if (period === 'year')   return 'ano';
  if (period === 'custom' && from && to) return `${from}_${to}`;
  return 'periodo';
}

// ════════════════════════════════════════════════════
// RECURRING GENERATION  (called once on app load)
// ════════════════════════════════════════════════════
function generateRecurring() {
  const expenses = loadExpAll();
  const today    = todayISO();
  const limit    = addMonths(today, 24);

  // Group recurring expenses by notes key; find earliest entry as template
  const groups = {};
  for (const e of expenses) {
    if (!e.isRecurring || e.deleted) continue;
    const key = e.notes || e.id;
    if (!groups[key]) groups[key] = { template: e, covered: new Set() };
    groups[key].covered.add(e.date.slice(0, 7));
    if (e.date < groups[key].template.date) groups[key].template = e;
  }
  if (!Object.keys(groups).length) return;

  const existingIds = new Set(expenses.map(e => e.id));
  const toAdd = [];

  for (const { template: t, covered } of Object.values(groups)) {
    const safeKey = (t.notes || '').toUpperCase().replace(/[^A-Z0-9]/g, '_') || 'REC';
    let cur = addMonths(t.date, 1); // month after original; original already exists
    while (cur <= limit) {
      if (t.recurringEndDate && cur > t.recurringEndDate) break;
      const ym = cur.slice(0, 7);
      const [y, mo] = ym.split('-');
      const rid = 'recur_' + safeKey + '_' + y + '_' + mo;
      if (!existingIds.has(rid) && !covered.has(ym)) {
        toAdd.push({ ...t, id: rid, date: cur, installments: 1, currentInstallment: 1 });
        covered.add(ym);
        existingIds.add(rid);
      }
      cur = addMonths(cur, 1);
    }
  }

  if (toAdd.length) {
    console.log('[generateRecurring] adding', toAdd.length, 'entries');
    saveExp([...expenses, ...toAdd]);
  }
}


// ════════════════════════════════════════════════════
// FORMAT HELPERS
// ════════════════════════════════════════════════════
const brl = n => Number(n).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
const fmtDate  = iso => iso ? iso.split('-').reverse().join('/')  : '';
const fmtShort = iso => { if (!iso) return ''; const [,m,d] = iso.split('-'); return `${d}/${m}`; };
const esc = s => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const MONTH_SHORT = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
function fmtCycleLabel(isoStart) {
  const d = new Date(isoStart + 'T12:00:00');
  return `${MONTH_SHORT[d.getMonth()]}/${String(d.getFullYear()).slice(2)}`;
}

function applySortList(arr, sortKey) {
  const r = [...arr];
  if (sortKey === 'date-desc') r.sort((a,b) => {
    const d = b.date.localeCompare(a.date);
    return d !== 0 ? d : (b.createdAt || 0) - (a.createdAt || 0); // same date: newest added first
  });
  if (sortKey === 'date-asc')  r.sort((a,b) => {
    const d = a.date.localeCompare(b.date);
    return d !== 0 ? d : (a.createdAt || 0) - (b.createdAt || 0); // same date: oldest added first
  });
  if (sortKey === 'val-asc')   r.sort((a,b) => a.amount - b.amount);
  if (sortKey === 'val-desc')  r.sort((a,b) => b.amount - a.amount);
  return r;
}

function buildSortBar(stateKey) {
  const cur = S[stateKey];
  return `<div class="sort-bar">${[
    ['date-desc','Data ↓'],['date-asc','Data ↑'],
    ['val-desc','Valor ↓'],['val-asc','Valor ↑']
  ].map(([k,l]) =>
    `<button class="sort-btn${cur===k?' active':''}" onclick="setSort('${stateKey}','${k}')">${l}</button>`
  ).join('')}</div>`;
}

function setSort(stateKey, val) {
  S[stateKey] = val;
  S.expandedEntry = null;
  renderSection(S.section);
}

function buildFilterTags(stateKey, items) {
  const cur = S[stateKey];
  return `<div class="filter-tags">${items.map(({label, value}) => {
    const active = value === null ? !cur : cur === value;
    const call   = value === null ? `setFilter('${stateKey}',null)` : `setFilter('${stateKey}','${value.replace(/'/g,"\\'")}')`;
    return `<button class="filter-tag${active?' active-lime':''}" onclick="${call}">${esc(label)}</button>`;
  }).join('')}</div>`;
}

function setFilter(stateKey, val) {
  S[stateKey] = val || null;
  S.expandedEntry = null;
  renderSection(S.section);
}


// ════════════════════════════════════════════════════
// CC SUMMARY — auto pix entry for each credit cycle
// ════════════════════════════════════════════════════
function updateCreditCardSummaries() {
  const expenses = loadExp();
  const real     = expenses.filter(e => !e.isCreditCardSummary && !e.deleted);

  // Collect all unique billing-cycle start dates present in expense data (past + future)
  const cycleStarts = new Set();
  for (const e of real) {
    if (e.paymentMethod === 'credit_card') cycleStarts.add(isoDate(cycleStart(e.date)));
  }
  if (!cycleStarts.size) {
    // No credit card expenses: remove all existing summaries
    const withoutSums = real;
    if (withoutSums.length !== expenses.length) saveExp(withoutSums);
    return;
  }

  const newSums = [];
  for (const csISO of cycleStarts) {
    // Cycle end = 2nd of the following month
    const cycleEnd = addMonths(csISO, 1);          // gives 3rd of next month
    const dayBefore = new Date(cycleEnd + 'T12:00:00');
    dayBefore.setDate(dayBefore.getDate() - 1);   // 2nd of next month
    const endISO = isoDate(dayBefore);

    const total = real
      .filter(e => e.paymentMethod === 'credit_card' && e.date >= csISO && e.date <= endISO)
      .reduce((s, e) => s + e.amount, 0);
    if (total <= 0) continue;

    const sumDate = addMonths(csISO, 1);           // 3rd of following month
    const [y, m]  = sumDate.slice(0, 7).split('-');
    newSums.push({
      id: 'cc_total_' + y + '_' + m,
      date: sumDate,
      segment: 'Outros',
      amount: +total.toFixed(2),
      installments: 1, currentInstallment: 1,
      paymentMethod: 'pix', isRecurring: false, recurringEndDate: null,
      notes: 'Cartão de Crédito',
      _groupId: 'cc_total_' + y + '_' + m,
      isCreditCardSummary: true,
    });
  }

  const merged = [...real, ...newSums];
  if (JSON.stringify(merged) !== JSON.stringify(expenses)) saveExp(merged);
}

function destroyAllCharts() {
  for (const k of Object.keys(CI)) { try { CI[k].destroy(); } catch(e){} delete CI[k]; }
}

function deepMerge(a, b) {
  for (const k of Object.keys(b || {})) {
    if (b[k] && typeof b[k] === 'object' && !Array.isArray(b[k])) {
      a[k] = deepMerge(typeof a[k] === 'object' ? a[k] : {}, b[k]);
    } else { a[k] = b[k]; }
  }
  return a;
}

function mkChart(id, type, data, extra) {
  if (CI[id]) { try { CI[id].destroy(); } catch(e){} delete CI[id]; }
  const canvas = document.getElementById(id);
  if (!canvas) return;

  const tickFont = { size: 11, family: "'DM Sans',sans-serif" };
  const opts = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: 'rgba(0,0,0,0.75)', padding: 10, cornerRadius: 4, borderWidth: 0,
        titleFont: tickFont, bodyFont: tickFont,
        callbacks: { label: ctx => ' ' + brl(ctx.raw) }
      }
    },
    animation: { duration: 400, easing: 'easeOutQuart' }
  };

  if (type !== 'doughnut') {
    opts.scales = {
      x: {
        grid: { color: 'rgba(255,255,255,0.06)' },
        border: { display: false },
        ticks: { color: 'rgba(255,255,255,0.5)', font: tickFont }
      },
      y: {
        grid: { color: 'rgba(255,255,255,0.06)' },
        border: { display: false },
        ticks: {
          color: 'rgba(255,255,255,0.5)',
          font: tickFont,
          callback: v => brl(v)
        }
      }
    };
  } else {
    opts.plugins.legend = {
      display: true, position: 'bottom',
      labels: {
        color: 'rgba(255,255,255,0.55)',
        font: tickFont,
        padding: 10, boxWidth: 10, boxHeight: 10
      }
    };
  }

  if (extra) deepMerge(opts, extra);
  CI[id] = new Chart(canvas.getContext('2d'), { type, data, options: opts });
}

function chkXLSX() {
  if (typeof XLSX === 'undefined') { alert('SheetJS indisponível. Verifique sua conexão.'); return false; }
  return true;
}

function doExportGastos(expenses, pLabel) {
  if (!chkXLSX()) return;
  const rows = [['Data','Segmento','Valor (R$)','Parcelas','Meio','Recorrente']];
  for (const e of expenses) {
    rows.push([
      fmtDate(e.date),
      e.segment,
      Number(e.amount.toFixed(2)),
      e.installments > 1 ? `${e.currentInstallment}/${e.installments}` : 'À vista',
      e.paymentMethod === 'credit_card' ? 'Cartão de crédito' : 'Pix',
      e.isRecurring ? 'Sim' : 'Não'
    ]);
  }
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), 'Gastos');
  XLSX.writeFile(wb, `gastos-${pLabel}-${todayISO()}.xlsx`);
}

function getMondayISO(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const dow = d.getDay();
  d.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
  return isoDate(d);
}
function weekRangeLabel(mondayISO) {
  const MO = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const mon = new Date(mondayISO + 'T12:00:00');
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  return mon.getMonth() === sun.getMonth()
    ? `${mon.getDate()}–${sun.getDate()} ${MO[mon.getMonth()]}`
    : `${mon.getDate()} ${MO[mon.getMonth()]} – ${sun.getDate()} ${MO[sun.getMonth()]}`;
}
function buildExpListHtml(sorted, emptyMsg) {
  if (!sorted.length) return '<div class="empty-state">' + emptyMsg + '</div>';
  let html = '', lastWk = null;
  for (const e of sorted) {
    const wk = getMondayISO(e.date);
    if (lastWk !== null && wk !== lastWk)
      html += '<div class="week-sep"><div class="week-sep-label">' + weekRangeLabel(wk) + '</div><div class="week-sep-line"></div></div>';
    html += expenseEntryHtml(e);
    lastWk = wk;
  }
  return html;
}

function toggleEntry(type, id) {
  if (S.expandedEntry && S.expandedEntry.type === type && S.expandedEntry.id === id) {
    S.expandedEntry = null;
  } else {
    S.expandedEntry = { type, id };
  }
  renderSection(S.section);
}

function eeSelectMeio(eid, val) {
  const cc  = document.getElementById('ee-cc-'  + eid);
  const pix = document.getElementById('ee-pix-' + eid);
  if (cc)  cc.classList.toggle('selected',  val === 'credit_card');
  if (pix) pix.classList.toggle('selected', val === 'pix');
}

function saveExpEntry(id) {
  const expenses = loadExpAll();
  const idx = expenses.findIndex(e => e.id === id);
  if (idx < 0) return;
  const orig  = expenses[idx];
  const date  = document.getElementById('ee-date-'  + id).value;
  const seg   = document.getElementById('ee-seg-'   + id).value;
  const val   = parseFloat(document.getElementById('ee-val-' + id).value);
  const notes = document.getElementById('ee-notes-' + id).value.trim();
  const mCC   = document.getElementById('ee-cc-'    + id).classList.contains('selected');
  if (!date || !seg || isNaN(val) || val <= 0) return;
  expenses[idx] = { ...orig, date, segment: seg, amount: val, notes, paymentMethod: mCC ? 'credit_card' : 'pix' };
  saveExp(expenses);
  if ((orig.installments > 1 || orig.isRecurring) && (seg !== orig.segment || notes !== orig.notes || val !== orig.amount)) {
    S.pendingGroupEdit = { id, groupId: orig._groupId, origNotes: orig.notes, newSeg: seg, newNotes: notes, newAmt: val, isRec: orig.isRecurring };
    S.expandedEntry = { type: 'exp', id };
  } else {
    S.expandedEntry = null;
  }
  renderSection(S.section);
}

function applyGroupEdit(applyAll) {
  if (!S.pendingGroupEdit) return;
  if (applyAll) {
    const { groupId, origNotes, newSeg, newNotes, newAmt, isRec } = S.pendingGroupEdit;
    const updated = loadExpAll().map(e => {
      if (isRec) {
        return (e.isRecurring && e.notes === origNotes)
          ? { ...e, segment: newSeg, notes: newNotes, amount: newAmt } : e;
      }
      return e._groupId === groupId ? { ...e, segment: newSeg, notes: newNotes } : e;
    });
    saveExp(updated);
  }
  S.pendingGroupEdit = null;
  S.expandedEntry    = null;
  renderSection(S.section);
}

function deleteExpEntry(id) {
  const e = loadExp().find(x => x.id === id);
  if (e && e.isRecurring) {
    S.pendingDeleteRecurring = { id, notes: e.notes, date: e.date };
    S.expandedEntry = { type: 'exp', id };
    renderSection(S.section);
  } else if (e && e.installments > 1) {
    S.pendingDeleteInstallment = { id, groupId: e._groupId, currentInstallment: e.currentInstallment, notes: e.notes };
    S.expandedEntry = { type: 'exp', id };
    renderSection(S.section);
  } else {
    saveExp(loadExpAll().map(x => x.id === id ? {...x, deleted: true} : x));
    S.expandedEntry = null;
    renderSection(S.section);
  }
}

function confirmDeleteInstallment(forward) {
  if (!S.pendingDeleteInstallment) return;
  const { id, groupId, currentInstallment } = S.pendingDeleteInstallment;
  if (forward) {
    saveExp(loadExpAll().map(e => (e._groupId === groupId && e.currentInstallment >= currentInstallment) ? {...e, deleted:true} : e));
  } else {
    saveExp(loadExpAll().map(e => e.id === id ? {...e, deleted:true} : e));
  }
  S.pendingDeleteInstallment = null;
  S.expandedEntry = null;
  renderSection(S.section);
}

function confirmDeleteRecurring(forward) {
  if (!S.pendingDeleteRecurring) return;
  const { id, notes, date } = S.pendingDeleteRecurring;
  if (forward) {
    saveExp(loadExpAll().map(e => (e.isRecurring && e.notes === notes && e.date >= date) ? {...e, deleted:true} : e));
  } else {
    saveExp(loadExpAll().map(e => e.id === id ? {...e, deleted:true} : e));
  }
  S.pendingDeleteRecurring = null;
  S.expandedEntry = null;
  renderSection(S.section);
}

function submitGasto(ev) {
  ev.preventDefault();
  const date    = document.getElementById('g-date').value;
  const segment = document.getElementById('g-seg').value;
  const valor   = parseFloat(document.getElementById('g-valor').value);
  const notes   = document.getElementById('g-notes') ? document.getElementById('g-notes').value.trim() : '';
  const form        = ev.target;
  const lockedMethod = form.getAttribute('data-locked') || null;
  const tipo         = S.gastoTipo || 'avista';
  if (!date || !segment || isNaN(valor) || valor <= 0) return;

  const groupId      = uid();
  const payMethod    = lockedMethod || S.meioSelected;
  const newExps      = [];

  if (tipo === 'parc') {
    const pRaw     = parseInt((document.getElementById('g-parcelas') || {}).value, 10);
    const parcelas = (!pRaw || pRaw < 2) ? 2 : Math.min(pRaw, 99);
    const iRaw     = parseInt((document.getElementById('g-parcela-inicial') || {}).value, 10);
    const inicial  = (!iRaw || iRaw < 1) ? 1 : Math.min(iRaw, parcelas);
    for (let k = inicial; k <= parcelas; k++) {
      newExps.push({ id:uid(), date:addMonths(date, k - inicial), segment, amount:valor,
        installments:parcelas, currentInstallment:k, paymentMethod:payMethod,
        isRecurring:false, recurringEndDate:null, notes, _groupId:groupId, createdAt:Date.now() });
    }
  } else if (tipo === 'rec') {
    const te = document.getElementById('g-termina');
    newExps.push({ id:uid(), date, segment, amount:valor, installments:1, currentInstallment:1,
      paymentMethod:payMethod, isRecurring:true, recurringEndDate:(te&&te.value?te.value:null),
      notes, _groupId:groupId, createdAt:Date.now() });
  } else {
    newExps.push({ id:uid(), date, segment, amount:valor, installments:1, currentInstallment:1,
      paymentMethod:payMethod, isRecurring:false, recurringEndDate:null, notes, _groupId:groupId, createdAt:Date.now() });
  }

  saveExp([...loadExpAll(), ...newExps]);
  if (tipo === 'rec') generateRecurring();
  S.homeFormOpen = false; S.cartaoFormOpen = false; S.pixFormOpen = false;
  S.gastoTipo = 'avista'; S.meioSelected = 'credit_card';
  updateCreditCardSummaries();
  renderSection(S.section);
}

/* ─── HOME SUMMARY ─── */
function homeSummaryHtml() {
  const cs      = isoDate(cycleStart());
  const today   = todayISO();
  const allCycleExp = loadExp().filter(e => !e.deleted && e.date >= cs && e.date <= today);

  const totals = {};
  SEGMENTS.forEach(s => totals[s] = 0);
  allCycleExp.forEach(e => { if (totals[e.segment] !== undefined) totals[e.segment] += e.amount; });

  // Cards sorted descending by spend
  const sortedSegs = [...SEGMENTS].sort((a,b) => totals[b] - totals[a]);
  const cards = sortedSegs.map(s => `
    <div class="${S.expandedSegCard===s?'seg-card seg-active':'seg-card'}" onclick="toggleSegCard(this.dataset.s)" data-s="${esc(s)}">
      <div class="seg-card-name">${esc(s)}</div>
      <div class="seg-card-amount">${brl(totals[s])}</div>
    </div>`).join('');

  // Filter tags (only segments with spend)
  const usedSegs = sortedSegs.filter(s => totals[s] > 0);
  const filterItems = [{label:'Todos',value:null}, ...usedSegs.map(s => ({label:s,value:s}))];

  // Apply segment filter then sort
  const filtered = S.homeSeg ? allCycleExp.filter(e => e.segment === S.homeSeg) : allCycleExp;
  const sorted   = applySortList(filtered, S.homeSort);

  const list = buildExpListHtml(sorted, 'Nenhum gasto registrado este ciclo.');

  // Expanded segment card
  const exSeg = S.expandedSegCard;
  let expandedCardHtml = '';
  if (exSeg) {
    const segExp = allCycleExp.filter(e => e.segment === exSeg).sort((a,b) => b.date.localeCompare(a.date));
    expandedCardHtml = '<div class="seg-expanded"><div class="seg-expanded-title">' + esc(exSeg) + '</div>' +
      buildExpListHtml(segExp, 'Sem gastos.') +
      '</div>';
  }

  return `
    <div class="cards-scroll">${cards}</div>
    ${expandedCardHtml}
    <hr class="divider">
    <div class="list-header">Gastos do ciclo atual</div>
    ${buildFilterTags('homeSeg', filterItems)}
    ${buildSortBar('homeSort')}
    <div class="entry-list">${list}</div>
`;
}

// SECTION 5 — INSIGHTS
// ════════════════════════════════════════════════════
function renderInsights() {
  const el     = document.getElementById('section-insights');
  const cs     = isoDate(cycleStart());
  const today  = todayISO();
  const allExp = loadExp().filter(e => !e.deleted);

  /* cycle data */
  const cycleExp      = allExp.filter(e => e.date >= cs && e.date <= today);
  const cycleTotal    = cycleExp.reduce((s,e) => s+e.amount, 0);

  /* 1. Segmento líder */
  let topSeg = null;
  if (cycleTotal > 0) {
    const byS = {};
    SEGMENTS.forEach(s => byS[s] = 0);
    cycleExp.forEach(e => { if (byS[e.segment] !== undefined) byS[e.segment] += e.amount; });
    const [name, amt] = Object.entries(byS).sort((a,b) => b[1]-a[1])[0];
    if (amt > 0) topSeg = { name, amt, pct: Math.round(amt/cycleTotal*100) };
  }

  /* 2. Maior gasto único */
  const topSingle = cycleExp.length > 0
    ? cycleExp.reduce((best,e) => e.amount > best.amount ? e : best, cycleExp[0])
    : null;

  /* 3. Média diária */
  const csDate   = new Date(cs + 'T12:00:00');
  const todayD   = new Date(today + 'T12:00:00');
  const daysElapsed = Math.max(1, Math.round((todayD - csDate)/(864e5)) + 1);
  const avgDaily = cycleTotal / daysElapsed;

  /* Sparkline: last 7 days expense totals */
  const spark7 = Array.from({length:7}, (_, i) => {
    const d = new Date(); d.setDate(d.getDate() - (6 - i));
    const dISO = isoDate(d);
    return cycleExp.filter(e => e.date === dISO).reduce((s,e) => s+e.amount, 0);
  });

  const relacao = null; // income removed

  /* 5. Comprometimento futuro (next 6 cycles) */
  const futureExp = allExp.filter(e => e.date > today);
  const cs0 = cycleStart();
  const commitments = [];
  let maxCommit = 0;
  for (let i = 1; i <= 6; i++) {
    const ms    = new Date(cs0.getFullYear(), cs0.getMonth()+i, 3);
    const me    = new Date(cs0.getFullYear(), cs0.getMonth()+i+1, 2);
    const msISO = isoDate(ms), meISO = isoDate(me);
    const total = futureExp.filter(e => e.date >= msISO && e.date <= meISO).reduce((s,e) => s+e.amount, 0);
    commitments.push({ label: fmtCycleLabel(msISO), total });
    if (total > maxCommit) maxCommit = total;
  }

  /* 6. Mês com maior gasto histórico */
  let mostExpCycle = null;
  if (allExp.length > 0) {
    const by = {};
    allExp.forEach(e => { const k=isoDate(cycleStart(e.date)); by[k]=(by[k]||0)+e.amount; });
    const [k,v] = Object.entries(by).sort((a,b) => b[1]-a[1])[0];
    mostExpCycle = { label: fmtCycleLabel(k), total: v };
  }


  /* 8. Sequência de dias sem gastos */
  const expDates = new Set(allExp.map(e => e.date));
  let streak = 0;
  for (let d = new Date(todayD); streak <= 365; d.setDate(d.getDate()-1)) {
    if (expDates.has(isoDate(d))) break;
    streak++;
  }

  /* 9. Gasto médio por segmento — últimos 3 ciclos */
  const cycles3  = lastNCycles(3);
  const segAvgs  = SEGMENTS.map(seg => {
    const tot = cycles3.reduce((s,c) =>
      s + allExp.filter(e => e.date>=c.start && e.date<=c.end && e.segment===seg).reduce((ss,e)=>ss+e.amount,0), 0);
    return { seg, avg: tot/3 };
  }).filter(x => x.avg > 0).sort((a,b) => b.avg-a.avg);


  /* ── extra insight computations ── */
  const nextCsDate     = new Date(cs0.getFullYear(), cs0.getMonth()+1, 3);
  const totalCycleDays = Math.max(1, Math.round((nextCsDate - new Date(cs+'T12:00:00'))/864e5));
  const daysRemaining  = Math.max(0, Math.round((nextCsDate - new Date(today+'T12:00:00'))/864e5));
  const pctConsumed    = Math.min(100, Math.round(daysElapsed/totalCycleDays*100));
  const projCycleAmt   = cycleTotal > 0 ? +(avgDaily * totalCycleDays).toFixed(2) : 0;

  const segTot3 = {};
  SEGMENTS.forEach(s => segTot3[s] = 0);
  cycles3.forEach(c => allExp.filter(e => e.date>=c.start&&e.date<=c.end)
    .forEach(e => { if (segTot3[e.segment]!==undefined) segTot3[e.segment]+=e.amount; }));
  const topSeg3E = Object.entries(segTot3).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1])[0];
  let trendTxt = 'sem tendência';
  if (topSeg3E && cycles3.length >= 2) {
    const prev3 = allExp.filter(e=>e.date>=cycles3[cycles3.length-2].start&&e.date<=cycles3[cycles3.length-2].end&&e.segment===topSeg3E[0]).reduce((s,e)=>s+e.amount,0);
    const last3 = allExp.filter(e=>e.date>=cycles3[cycles3.length-1].start&&e.date<=cycles3[cycles3.length-1].end&&e.segment===topSeg3E[0]).reduce((s,e)=>s+e.amount,0);
    if (prev3>0){const d=Math.round((last3-prev3)/prev3*100);trendTxt=d>0?'crescendo ↑ '+d+'%':d<0?'reduzindo ↓ '+Math.abs(d)+'%':'estável';}
  }

  const totalPaidInst   = allExp.filter(e=>e.installments>1&&e.date<=today).reduce((s,e)=>s+e.amount,0);
  const totalFutureInst = allExp.filter(e=>e.installments>1&&e.date>today).reduce((s,e)=>s+e.amount,0);

  const allCycles12 = lastNCycles(12);
  let bestSaldo=null, worstSaldo=null;
  for (const c of allCycles12) {
    const tE=allExp.filter(e=>e.date>=c.start&&e.date<=c.end).reduce((s,e)=>s+e.amount,0);
    const sl = -tE;
    if(bestSaldo===null||sl>bestSaldo.saldo) bestSaldo={label:c.label,saldo:sl};
    if(worstSaldo===null||sl<worstSaldo.saldo) worstSaldo={label:c.label,saldo:sl};
  }

  /* ── HTML ── */
  const barH = 44;
  const commitBarHtml = maxCommit > 0
    ? `<div class="commit-bars" style="height:${barH+18}px">${commitments.map(c => {
        const h = Math.max(2, Math.round(c.total/maxCommit*barH));
        return `<div class="commit-bar-col">
          <div class="commit-bar" style="height:${h}px" title="${brl(c.total)}"></div>
          <div class="commit-bar-lbl">${c.label}</div>
        </div>`;
      }).join('')}</div>`
    : '<p style="color:var(--muted);font-size:13px;margin:8px 0 0">Sem parcelas futuras registradas.</p>';

  const segAvgHtml = segAvgs.length > 0
    ? `<table class="insight-table">${segAvgs.map(x =>
        `<tr><td>${esc(x.seg)}</td><td>${brl(x.avg)}</td></tr>`).join('')}</table>`
    : '<p style="color:var(--muted);font-size:13px;margin:6px 0 0">Sem dados suficientes.</p>';

  el.innerHTML = `
    <h1 class="section-title">Insights</h1>

    <div class="insight-card">
      <div class="insight-label">Categoria líder — ciclo atual</div>
      ${topSeg
        ? `<div class="insight-value">${esc(topSeg.name)}</div><div class="insight-sub">${brl(topSeg.amt)} · ${topSeg.pct}% do total</div>`
        : '<div class="insight-sub" style="margin-top:4px">Sem gastos registrados este ciclo.</div>'}
    </div>

    <div class="insight-card">
      <div class="insight-label">Maior gasto único — ciclo atual</div>
      ${topSingle
        ? `<div class="insight-value">${brl(topSingle.amount)}</div><div class="insight-sub">${topSingle.notes ? esc(topSingle.notes) : esc(topSingle.segment)} · ${fmtDate(topSingle.date)}</div>`
        : '<div class="insight-sub" style="margin-top:4px">Sem gastos registrados este ciclo.</div>'}
    </div>

    <div class="insight-card">
      <div class="insight-label">Média diária de gastos — ciclo atual</div>
      <div class="insight-value">${cycleTotal > 0 ? brl(avgDaily) : '—'}</div>
      ${cycleTotal > 0 ? `<div class="insight-sub">${daysElapsed} dias decorridos no ciclo</div>` : ''}
    </div>

<div class="insight-card">
      <div class="insight-label">Gasto médio por segmento — últimos 3 ciclos</div>
      ${segAvgHtml}
    </div>


    <div class="insight-card">
      <div class="insight-label">Maior categoria — últimos 3 ciclos</div>
      ${topSeg3E
        ? `<div class="insight-value">${esc(topSeg3E[0])}</div><div class="insight-sub">${brl(topSeg3E[1])} total · ${trendTxt}</div>`
        : '<div class="insight-sub" style="margin-top:4px">Sem dados.</div>'}
    </div>

    <div class="insight-card">
      <div class="insight-label">Total pago em parcelas</div>
      <div class="insight-value">${totalPaidInst > 0 ? brl(totalPaidInst) : '—'}</div>
      ${totalPaidInst > 0 ? '<div class="insight-sub">histórico de parcelas quitadas</div>' : ''}
    </div>

    <div class="insight-card">
      <div class="insight-label">Total ainda a pagar em parcelas</div>
      <div class="insight-value negative">${totalFutureInst > 0 ? brl(totalFutureInst) : '—'}</div>
      ${totalFutureInst > 0 ? '<div class="insight-sub">parcelas futuras já registradas</div>' : ''}
    </div>

    <div class="insight-card">
      <div class="insight-label">Projeção de gasto do ciclo atual</div>
      <div class="insight-value">${projCycleAmt > 0 ? brl(projCycleAmt) : '—'}</div>
      ${projCycleAmt > 0 ? `<div class="insight-sub">mantendo média de ${brl(avgDaily)}/dia</div>` : ''}
    </div>

    <div class="insight-card">
      <div class="insight-label">Ciclo com melhor saldo</div>
      ${bestSaldo
        ? `<div class="insight-value ${bestSaldo.saldo>=0?'positive':'negative'}">${brl(bestSaldo.saldo)}</div><div class="insight-sub">${esc(bestSaldo.label)}</div>`
        : '<div class="insight-sub" style="margin-top:4px">Sem dados.</div>'}
    </div>

    <div class="insight-card">
      <div class="insight-label">Ciclo com pior saldo</div>
      ${worstSaldo
        ? `<div class="insight-value ${worstSaldo.saldo>=0?'positive':'negative'}">${brl(worstSaldo.saldo)}</div><div class="insight-sub">${esc(worstSaldo.label)}</div>`
        : '<div class="insight-sub" style="margin-top:4px">Sem dados.</div>'}
    </div>


    <div class="insight-card">
      <div class="insight-label">Dias restantes no ciclo</div>
      <div class="insight-value">${daysRemaining} ${daysRemaining===1?'dia':'dias'}</div>
      <div class="insight-sub">de ${totalCycleDays} dias no ciclo total</div>
    </div>

    <div class="insight-card">
      <div class="insight-label">Ciclo consumido</div>
      <div class="insight-value">${pctConsumed}%</div>
      <div class="cycle-progress-track"><div class="cycle-progress-fill" style="width:${pctConsumed}%"></div></div>
      <div class="insight-sub" style="margin-top:6px">${daysElapsed} de ${totalCycleDays} dias decorridos</div>
    </div>
    <div class="locked-card">
      <div style="font-size:22px;margin-bottom:8px;opacity:.5">🔒</div>
      <div style="font-weight:500;margin-bottom:6px;color:rgba(255,255,255,.5)">Metas</div>
      <div>Em breve: defina limites por segmento e metas de poupança</div>
    </div>`;

    s.classList.remove('visible');
  });
  document.querySelectorAll('.nav-item').forEach(n =>
    n.classList.toggle('active', n.dataset.section === name)
  );

  S.section = name;
  renderSection(name);

  const el = document.getElementById(`section-${name}`);
  el.style.display = 'block';
  // Double rAF ensures paint before transition
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('visible')));
}



// ════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  if (typeof Chart !== 'undefined') {
    Chart.defaults.font.family = "'DM Sans', sans-serif";
    Chart.defaults.font.size   = 11;
    Chart.defaults.color       = 'rgba(255,255,255,0.6)';
  }

  // One-time data wipe
  if (!localStorage.getItem('pf_wipe_v2')) {
    localStorage.removeItem('pf_expenses');
    localStorage.removeItem('pf_income');
    DB.expenses = [];
    serverSet([]);
    localStorage.setItem('pf_wipe_v2', '1');
  }

  // Show thin loading bar — data coming from Sheets
  const bar = document.getElementById('sync-bar');
  if (bar) bar.style.display = 'block';

  // Preload localStorage as instant fallback while we wait for API
  try { loadFromCache(); } catch(e) { DB.expenses = []; }

  // Fetch expenses from server — 8-second timeout, then fall back to cache
  let apiOk = false;
  try {
    const _fetch   = serverGet();
    const _timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 8000));
    const re = await Promise.race([_fetch, _timeout]);
    if (Array.isArray(re)) {
      const local    = DB.expenses;
      const localMap = {};
      for (const e of local) localMap[e.id] = true;
      const toAdd    = re.filter(e => !localMap[e.id]);
      const merged   = [...local, ...toAdd];
      console.log('[init] local=' + local.length + ' server=' + re.length + ' merged=' + merged.length);
      DB.expenses = merged;
      localStorage.setItem('pf_expenses', JSON.stringify(merged));
      if (toAdd.length === 0 && local.length > re.length) {
        serverSet(local); // local has more — push to Sheets
      } else if (toAdd.length > 0) {
        serverSet(merged); // merged has new entries — push back
      }
    }
    apiOk = true;
  } catch(e) { /* timeout or network error — DB already has localStorage data */ }

  // Hide loading bar
  if (bar) { bar.style.opacity = '0'; bar.style.transition = 'opacity 400ms'; setTimeout(() => { bar.style.display = 'none'; bar.style.opacity = '1'; bar.style.transition = ''; }, 420); }
  setSyncDot(apiOk ? 'green' : 'red');

  try { generateRecurring(); } catch(e) { console.warn('generateRecurring', e); }
  try { updateCreditCardSummaries(); } catch(e) { console.warn('updateCreditCardSummaries', e); }
  S.section = 'home';  // explicit default — nav always shows Início active
  showSection('home');

  
});
</script>
